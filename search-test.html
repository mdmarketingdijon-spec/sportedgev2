<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test Search</title></head>
<body>
<div style="padding:40px;max-width:600px;margin:0 auto;">
  <h2>Test moteur de recherche SportEdge</h2>
  <div class="relative group max-w-2xl" style="position:relative;">
    <input type="text" 
           id="se-search-input"
           placeholder="Search movements..."
           style="width:100%;height:50px;padding:0 16px;border:1px solid #ccc;border-radius:12px;font-size:16px;outline:none;">
  </div>
  <p id="debug" style="margin-top:20px;color:green;font-size:14px;">Chargement...</p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('debug').textContent = 'DOMContentLoaded OK';
  
  var input = document.getElementById('se-search-input');
  if (!input) {
    document.getElementById('debug').textContent = 'ERREUR: input non trouvé';
    return;
  }
  document.getElementById('debug').textContent = 'Input trouvé ✓';
  
  var DB = [
    {type:'category', title:'Yoga & Breathwork', dest:'library-yoga.html', 
     keywords:['yoga','breath','breathwork','flow','vinyasa','calm']},
    {type:'session', title:'Vinyasa Flow', category:'Yoga & Breathwork', dest:'library-yoga.html',
     intensity:'Medium', duration:'30 min', keywords:['vinyasa','flow','yoga','dynamic']},
    {type:'session', title:'Restorative Yoga', category:'Yoga & Breathwork', dest:'library-yoga.html',
     intensity:'Low', duration:'20 min', keywords:['restorative','yoga','relax','gentle']},
    {type:'category', title:'HIIT & Cardio', dest:'library-hiit.html',
     keywords:['hiit','cardio','interval','intense','sprint']},
    {type:'session', title:'Classic HIIT', category:'HIIT & Cardio', dest:'library-hiit.html',
     intensity:'High', duration:'20 min', keywords:['classic','hiit','intense','max']}
  ];
  
  var container = input.parentElement;
  while (container && !container.className.includes('relative')) {
    container = container.parentElement;
  }
  if (!container) container = input.parentElement;
  container.style.position = 'relative';
  
  var panel = document.createElement('div');
  panel.style.cssText = 'display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #ccc;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:9999;padding:8px;';
  container.appendChild(panel);
  
  input.addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    document.getElementById('debug').textContent = 'Recherche: ' + q + ' (' + q.length + ' chars)';
    
    if (q.length < 2) { panel.style.display = 'none'; return; }
    
    var hits = [];
    for (var i = 0; i < DB.length; i++) {
      var item = DB[i];
      var score = 0;
      if (item.title.toLowerCase().indexOf(q) !== -1) score += 10;
      var kws = item.keywords || [];
      for (var k = 0; k < kws.length; k++) {
        if (kws[k].toLowerCase().indexOf(q) !== -1) score += 5;
      }
      if (score > 0) hits.push({item:item, score:score});
    }
    hits.sort(function(a,b){ return b.score - a.score; });
    
    document.getElementById('debug').textContent = hits.length + ' résultats pour: ' + q;
    
    if (!hits.length) {
      panel.innerHTML = '<div style="padding:12px;color:#666">Aucun résultat</div>';
    } else {
      var html = '';
      for (var j = 0; j < hits.length; j++) {
        var it = hits[j].item;
        html += '<div onclick="location.href=\''+it.dest+'\'" style="padding:10px 12px;cursor:pointer;border-radius:8px" onmouseover="this.style.background=\'#f5f5f5\'" onmouseout="this.style.background=\'transparent\'">'
          + '<strong style="font-size:14px">' + it.title + '</strong>'
          + (it.intensity ? ' <span style="font-size:11px;color:#666">[' + it.intensity + ']</span>' : '')
          + '</div>';
      }
      panel.innerHTML = html;
    }
    panel.style.display = 'block';
  });
  
  document.addEventListener('mousedown', function(e) {
    if (!container.contains(e.target)) panel.style.display = 'none';
  });
  
  document.getElementById('debug').textContent = 'Prêt — tapez dans la barre de recherche';
});
</script>
</body>
</html>
