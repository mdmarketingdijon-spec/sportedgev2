<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gentle Flow - Standing Side Stretch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1D1A16;
      background-color: #FBFAF9;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .timer-display {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
    }

    .text-balance {
      text-wrap: balance;
    }

    .soft-glow {
      filter: drop-shadow(0 0 20px rgba(233, 150, 122, 0.15));
    }

    * {
      transition: all 0.2s ease;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .bg-blur-orange {
      background: rgba(236, 150, 121, 0.05);
      filter: blur(64px);
    }
    .bg-blur-green {
      background: rgba(103, 228, 187, 0.05);
      filter: blur(64px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center overflow-x-hidden">
  <!-- Background Decorative Elements -->
  <div class="fixed top-[-80px] right-[-40px] w-64 h-64 bg-blur-orange rounded-full pointer-events-none"></div>
  <div class="fixed bottom-[20%] left-[-80px] w-48 h-48 bg-blur-green rounded-full pointer-events-none"></div>

  <div class="relative w-full max-w-4xl mx-auto flex flex-col lg:flex-row lg:items-center lg:gap-12 min-h-screen lg:min-h-0 lg:py-12 px-6">
    
    <!-- Left Section: Visual & Header (Mobile: Top, Desktop: Left) -->
    <div class="flex-1 flex flex-col items-center text-center lg:text-left lg:items-start">
      <!-- Status Bar Placeholder (Mobile Only) -->
      <div class="w-full h-10 flex justify-between items-center lg:hidden mb-4">
        <img src="./assets-session-low-outdoor/IMG_1.svg" alt="Time" class="h-10">
        <img src="./assets-session-low-outdoor/IMG_2.svg" alt="Status Icons" class="h-10">
      </div>

      <!-- Tag -->
      <div class="inline-flex items-center px-3 py-1 bg-[#F2FDF9] rounded-full mb-4 lg:mb-6">
        <span class="text-[12px] font-semibold text-[#67E4BB] tracking-wide uppercase">GENTLE FLOW</span>
      </div>

      <!-- Title & Subtitle -->
      <h1 class="text-2xl md:text-4xl lg:text-5xl text-[#1D1A16] mb-2">Standing Side Stretch</h1>
      <p class="text-sm md:text-base text-[#6A5E53] mb-8 lg:mb-12">Focus on your breathing</p>

      <!-- Exercise Illustration -->
      <div class="relative w-64 h-64 md:w-80 md:h-80 lg:w-96 lg:h-96 mx-auto lg:mx-0 mb-8 lg:mb-0">
        <div class="absolute inset-0 bg-[#FBEAE4] rounded-full shadow-sm border-[4px] border-[#EC9679]/10 opacity-70"></div>
        <div class="absolute inset-0 flex items-center justify-center p-8">
          <img src="./assets-session-low-outdoor/IMG_3.webp" alt="Standing Side Stretch Illustration" class="w-full h-full object-contain">
        </div>
      </div>
    </div>

    <!-- Right Section: Controls & Progress (Mobile: Bottom, Desktop: Right) -->
    <div class="flex-1 w-full max-w-md mx-auto lg:max-w-sm flex flex-col justify-center">
      
      <!-- Timer Section -->
      <div class="text-center mb-10 lg:mb-16">
        <span class="block text-[12px] font-medium text-[#6A5E53] tracking-[1.2px] uppercase mb-2">Remaining</span>
        <span class="timer-display text-7xl md:text-8xl font-bold text-[#EC9679]">08:42</span>
      </div>

      <!-- Progress Section -->
      <div class="w-full mb-10">
        <div class="flex justify-between items-center mb-3">
          <span class="text-[12px] font-medium text-[#6A5E53] tracking-[0.6px] uppercase">Session Progress</span>
          <span class="text-[12px] font-bold text-[#67E4BB]">65%</span>
        </div>
        <div class="h-2 w-full bg-[#fdf3ef] rounded-full overflow-hidden">
          <div class="h-full bg-[#EC9679] rounded-full" style="width: 65%"></div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col gap-4 w-full">
        <button class="w-full h-14 bg-[#EC9679] hover:bg-[#e58564] text-[#1D1A16] font-semibold text-lg rounded-full shadow-md flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
          <img src="./assets-session-low-outdoor/IMG_4.svg" alt="Check" class="w-5 h-5">
          <span>Done</span>
        </button>
        
        <button class="w-full h-10 flex items-center justify-center gap-2 text-[#6A5E53] hover:text-[#1D1A16] font-medium text-sm transition-colors">
          <img src="./assets-session-low-outdoor/IMG_5.svg" alt="Skip" class="w-4 h-4">
          <span>Skip this exercise</span>
        </button>
      </div>

      <!-- Desktop Extra: Session Info (Only visible on larger screens) -->
      <div class="hidden lg:block mt-12 pt-8 border-t border-[#EC9679]/10">
        <div class="flex items-center gap-4 text-[#6A5E53]">
          <div class="p-3 bg-white rounded-2xl shadow-sm">
            <iconify-icon icon="ph:flame-fill" class="text-[#EC9679]" width="24"></iconify-icon>
          </div>
          <div>
            <p class="text-xs uppercase tracking-wider font-semibold opacity-60">Calories</p>
            <p class="text-lg font-bold text-[#1D1A16]">124 kcal</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Bottom Spacer -->
  <div class="h-8 lg:hidden"></div>




<script>
/* SportEdge Navigation v2 — session-low-outdoor.html */
(function() {
  var PAGE = 'session-low-outdoor.html';
  var IS_OUTDOOR = true;

  /* ── 1. BOTTOM NAV ── */
  var NAV_MAP = {
    'home':       'od-home-medium.html',
    'move':       'od-home-medium.html',
    'progress':   'od-progress.html',
    'activities': 'od-activities.html',
    'profile':    'od-profile.html',
    'bolt':       'od-bolt.html'
  };

  document.querySelectorAll('nav a, nav button').forEach(function(el) {
    var txt = el.innerText.trim().toLowerCase();
    var alt = (el.querySelector('img') || {}).alt || '';
    alt = alt.toLowerCase();
    Object.keys(NAV_MAP).forEach(function(k) {
      if (txt.indexOf(k) !== -1 || alt.indexOf(k) !== -1) {
        el.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = NAV_MAP[k];
        });
      }
    });
  });

  /* ── 2. DELEGATION GLOBALE sur tout le document ── */
  document.addEventListener('click', function(e) {
    var el = e.target;
    // Remonter jusqu'à 5 niveaux pour trouver le conteneur cliquable
    for (var i = 0; i < 5; i++) {
      if (!el || el === document.body) break;
      var txt = (el.innerText || '').trim().toLowerCase();

      /* CTA principaux */
      if (/(start now|let.s go|start session|begin|commencer)/.test(txt)) {
        e.preventDefault();
        if (PAGE === 'onboarding.html') {
          var energy = window._sportedgeEnergy || 'medium';
          var loc    = window._sportedgeLocation || 'indoor';
          if (loc === 'outdoor') {
            window.location.href = 'home-' + energy + '-outdoor.html';
          } else {
            window.location.href = 'home-' + energy + '.html';
          }
        } else {
          window.location.href = 'od-home-medium.html';
        }
        return;
      }

      /* Post-session / Done */
      if (/(done|finish|complete|great job|i did it|well done)/.test(txt) && txt.length < 40) {
        e.preventDefault(); window.location.href = 'celebration.html'; return;
      }

      /* Back to home / Return */
      if (/(back to home|go home|return home)/.test(txt)) {
        e.preventDefault(); window.location.href = 'od-home-medium.html'; return;
      }

      /* Save / Confirm overlays */
      if (/^save/.test(txt) || txt === 'save preferences' || txt === 'confirm') {
        e.preventDefault(); window.location.href = 'od-profile.html'; return;
      }

      /* Activities → Libraries */
      if (PAGE.indexOf('activities') !== -1 || PAGE.indexOf('od-activities') !== -1) {
        var libMap = {
          'stretching': 'od-library-stretching.html',
          'hiit':       'od-library-hiit.html',
          'cardio':     'od-library-hiit.html',
          'yoga':       'od-library-yoga.html',
          'breathwork': 'od-library-yoga.html',
          'outdoor run':'od-library-outdoor-runs.html',
          'strength':   'od-library-strength.html',
          'meditation': 'od-library-meditation.html',
          'mindful':    'od-library-meditation.html'
        };
        Object.keys(libMap).forEach(function(k) {
          if (txt.indexOf(k) !== -1) {
            e.preventDefault(); window.location.href = libMap[k]; return;
          }
        });
      }

      /* Profile → overlays */
      if (PAGE.indexOf('profile') !== -1) {
        if (txt.indexOf('notification') !== -1) {
          e.preventDefault(); window.location.href = 'od-notifications.html'; return;
        }
        if (txt.indexOf('energy') !== -1) {
          e.preventDefault(); window.location.href = 'od-energy.html'; return;
        }
        if (txt.indexOf('about') !== -1) {
          e.preventDefault(); window.location.href = 'od-about.html'; return;
        }
        if (txt.indexOf('training type') !== -1 || txt.indexOf('preferred') !== -1) {
          e.preventDefault(); window.location.href = 'od-notifications.html'; return;
        }
      }

      /* Library / Overlay → retour */
      if (/(library|session|celebration|notification|energy|about|notification)/.test(PAGE)) {
        var isBackEl = (txt === '' || txt === '←' || txt === '‹' || txt === 'back') &&
                       (el.tagName === 'BUTTON' || el.tagName === 'A');
        var hasBackImg = el.querySelector && el.querySelector('img[alt*="back"], img[alt*="Back"], img[alt*="arrow"], img[alt*="Arrow"]');
        if (isBackEl || hasBackImg) {
          e.preventDefault(); window.history.back(); return;
        }
      }

      el = el.parentElement;
    }
  });

  /* ── 3. ONBOARDING : sélection énergie + lieu ── */
  if (PAGE === 'onboarding.html') {
    window._sportedgeEnergy   = 'medium';
    window._sportedgeLocation = 'indoor';

    document.querySelectorAll('button, [class*="rounded"]').forEach(function(btn) {
      var txt = (btn.innerText || '').trim().toLowerCase();
      if (txt.indexOf('low') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'low';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('high') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'high';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('medium') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'medium';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('trainer') !== -1 || txt.indexOf('outdoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'outdoor';
          highlightSel(btn, 'location');
        });
      } else if (txt.indexOf('mat') !== -1 || txt.indexOf('indoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'indoor';
          highlightSel(btn, 'location');
        });
      }
    });

    /* CTA footer onboarding */
    var footerBtn = document.querySelector('footer button');
    if (footerBtn) {
      footerBtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var e2 = window._sportedgeEnergy;
        var l  = window._sportedgeLocation;
        window.location.href = (l === 'outdoor')
          ? 'home-' + e2 + '-outdoor.html'
          : 'home-' + e2 + '.html';
      });
    }
  }

  function highlightSel(el, group) {
    var sel = '[data-group="' + group + '"]';
    document.querySelectorAll(sel).forEach(function(b) {
      b.style.borderColor = 'transparent';
      b.style.backgroundColor = '#F6F5F3';
    });
    el.dataset.group = group;
    el.style.borderColor = '#EC9679';
    el.style.backgroundColor = '#FDF4F2';
  }

})();
</script>

</body>
</html>
