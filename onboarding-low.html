<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Move a little. Every day.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1D1A16;
      background-color: #FBFAF9;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    * {
      transition: all 0.2s ease;
    }

    .soft-shadow {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
    }

    .tap-highlight-none {
      -webkit-tap-highlight-color: transparent;
    }

    .bg-gradient-top {
      background: linear-gradient(180deg, #FDF4F2 0%, rgba(253, 244, 242, 0) 100%);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">

  <!-- Main Container -->
  <main class="relative w-full max-w-5xl min-h-screen flex flex-col lg:flex-row lg:items-start lg:justify-center lg:gap-12 lg:py-12">
    
    <!-- Background Gradient (Mobile only feel) -->
    <div class="absolute top-0 left-0 w-full h-[464px] bg-gradient-top opacity-50 pointer-events-none -z-10"></div>

    <!-- Left Column: Branding & Intro (Desktop Sidebar feel) -->
    <section class="w-full lg:w-1/3 px-6 pt-12 lg:pt-0 flex flex-col items-center lg:items-start text-center lg:text-left">
      <!-- Status Bar (Mobile Only) -->
      <div class="w-full flex justify-between items-center mb-8 lg:hidden">
        <img src="./assets-onboarding-low/IMG_1.svg" alt="Time" class="h-10">
        <img src="./assets-onboarding-low/IMG_2.svg" alt="Status Icons" class="h-10">
      </div>

      <!-- Logo Icon -->
      <div class="w-[72px] h-[72px] bg-[#EC9679] rounded-[14px] flex items-center justify-center mb-6 shadow-lg">
        <img src="./assets-onboarding-low/IMG_3.svg" alt="Zap" class="w-12 h-12 text-white">
      </div>

      <!-- Hero Text -->
      <h1 class="text-[20px] md:text-[24px] lg:text-[32px] font-medium text-[#6A5E53] mb-2">
        Move a little. Every day.
      </h1>
      <p class="text-[14px] md:text-[16px] text-[#6A5E53]/60 max-w-[290px] lg:max-w-none">
        Small steps lead to big changes. Let's find your movement today.
      </p>
    </section>

    <!-- Right Column: Form/Selection Area -->
    <section class="w-full lg:w-2/3 px-5 py-8 lg:py-0 space-y-8">
      
      <!-- Energy Section -->
      <div>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-[18px] font-bold">How's your energy?</h2>
          <span class="px-3 py-1 bg-[#F6F5F3] rounded-full text-[12px] font-semibold text-[#6A5E53]">Step 1/2</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-1 gap-3">
          <!-- Option: Low (Selected) -->
          <button class="flex items-center p-[18px] bg-[#FBEAE4] border-2 border-[#EC9679] rounded-[26px] soft-shadow text-left w-full tap-highlight-none hover:scale-[1.01]">
            <div class="w-9 h-9 bg-[#EC9679] rounded-full flex items-center justify-center mr-3 shrink-0">
              <img src="./assets-onboarding-low/IMG_4.svg" alt="Low Battery" class="w-5 h-5">
            </div>
            <div>
              <p class="text-[16px] font-semibold">Low</p>
              <p class="text-[12px] text-[#6A5E53]">Gentle, slow micro-movements</p>
            </div>
          </button>

          <!-- Option: Medium -->
          <button class="flex items-center p-[18px] bg-[#F6F5F3] border-2 border-transparent rounded-[26px] text-left w-full tap-highlight-none hover:bg-[#F0EEEB]">
            <div class="w-9 h-9 bg-[#F6F5F3] rounded-full flex items-center justify-center mr-3 shrink-0">
              <img src="./assets-onboarding-low/IMG_5.svg" alt="Coffee" class="w-5 h-5">
            </div>
            <div>
              <p class="text-[16px] font-semibold">Medium</p>
              <p class="text-[12px] text-[#6A5E53]">Balanced flow for the day</p>
            </div>
          </button>

          <!-- Option: High -->
          <button class="flex items-center p-[18px] bg-[#F6F5F3] border-2 border-transparent rounded-[26px] text-left w-full tap-highlight-none hover:bg-[#F0EEEB]">
            <div class="w-9 h-9 bg-[#F6F5F3] rounded-full flex items-center justify-center mr-3 shrink-0">
              <img src="./assets-onboarding-low/IMG_3.svg" alt="Zap" class="w-5 h-5 opacity-60">
            </div>
            <div>
              <p class="text-[16px] font-semibold">High</p>
              <p class="text-[12px] text-[#6A5E53]">Power up and get moving</p>
            </div>
          </button>
        </div>
      </div>

      <!-- Vibe Section -->
      <div>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-[18px] font-bold">What is the vibe today?</h2>
          <span class="px-3 py-1 bg-[#F6F5F3] rounded-full text-[12px] font-semibold text-[#6A5E53]">Step 2/2</span>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <!-- Vibe: Fitness Mat -->
          <button class="flex flex-col p-[18px] bg-[#F6F5F3] border-2 border-[#F6F5F3] rounded-[26px] soft-shadow text-left tap-highlight-none hover:bg-[#F0EEEB]">
            <div class="flex items-center mb-1">
              <img src="./assets-onboarding-low/IMG_6.svg" alt="Crunches" class="w-6 h-6 mr-2 opacity-70">
              <p class="text-[16px] font-bold text-[#171a1f]">Fitness Mat</p>
            </div>
            <p class="text-[12px] text-[#6A5E53] ml-8">Indoors or outdoors</p>
          </button>

          <!-- Vibe: Trainers -->
          <button class="flex flex-col p-[18px] bg-[#F6F5F3] border-2 border-transparent rounded-[26px] text-left tap-highlight-none hover:bg-[#F0EEEB]">
            <div class="flex items-center mb-1">
              <img src="./assets-onboarding-low/IMG_7.svg" alt="Trees" class="w-6 h-6 mr-2 opacity-70">
              <p class="text-[16px] font-bold text-[#171a1f]">Trainers</p>
            </div>
            <p class="text-[12px] text-[#6A5E53] ml-8">Outdoors</p>
          </button>
        </div>
      </div>

      <!-- Footer Action -->
      <div class="pt-8 pb-12 lg:pb-0 flex flex-col items-center">
        <p class="text-[12px] text-[#6A5E53] text-center mb-6 max-w-[280px]">
          By continuing, you agree to our gentle approach to fitness.
        </p>
        <button class="w-full max-w-[335px] h-[64px] bg-[#EC9679] rounded-full flex items-center justify-center gap-2 soft-shadow hover:brightness-105 active:scale-95">
          <span class="text-[18px] font-bold">Start now – no commitment</span>
          <img src="./assets-onboarding-low/IMG_8.svg" alt="Arrow Right" class="w-5 h-5">
        </button>
      </div>

    </section>
  </main>




<script>
/* SportEdge Navigation v2 — onboarding-low.html */
(function() {
  var PAGE = 'onboarding-low.html';
  var IS_OUTDOOR = false;

  /* ── 1. BOTTOM NAV ── */
  var NAV_MAP = {
    'home':       'home-medium.html',
    'move':       'home-medium.html',
    'progress':   'progress.html',
    'activities': 'activities.html',
    'profile':    'profile.html',
    'bolt':       'bolt.html'
  };

  document.querySelectorAll('nav a, nav button').forEach(function(el) {
    var txt = el.innerText.trim().toLowerCase();
    var alt = (el.querySelector('img') || {}).alt || '';
    alt = alt.toLowerCase();
    Object.keys(NAV_MAP).forEach(function(k) {
      if (txt.indexOf(k) !== -1 || alt.indexOf(k) !== -1) {
        el.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = NAV_MAP[k];
        });
      }
    });
  });

  /* ── 2. DELEGATION GLOBALE sur tout le document ── */
  document.addEventListener('click', function(e) {
    var el = e.target;
    // Remonter jusqu'à 5 niveaux pour trouver le conteneur cliquable
    for (var i = 0; i < 5; i++) {
      if (!el || el === document.body) break;
      var txt = (el.innerText || '').trim().toLowerCase();

      /* CTA principaux */
      if (/(start now|let.s go|start session|begin|commencer)/.test(txt)) {
        e.preventDefault();
        if (PAGE === 'onboarding.html') {
          var energy = window._sportedgeEnergy || 'medium';
          var loc    = window._sportedgeLocation || 'indoor';
          if (loc === 'outdoor') {
            window.location.href = 'home-' + energy + '-outdoor.html';
          } else {
            window.location.href = 'home-' + energy + '.html';
          }
        } else {
          window.location.href = 'home-medium.html';
        }
        return;
      }

      /* Post-session / Done */
      if (/(done|finish|complete|great job|i did it|well done)/.test(txt) && txt.length < 40) {
        e.preventDefault(); window.location.href = 'celebration.html'; return;
      }

      /* Back to home / Return */
      if (/(back to home|go home|return home)/.test(txt)) {
        e.preventDefault(); window.location.href = 'home-medium.html'; return;
      }

      /* Save / Confirm overlays */
      if (/^save/.test(txt) || txt === 'save preferences' || txt === 'confirm') {
        e.preventDefault(); window.location.href = 'profile.html'; return;
      }

      /* Activities → Libraries */
      if (PAGE.indexOf('activities') !== -1 || PAGE.indexOf('od-activities') !== -1) {
        var libMap = {
          'stretching': 'library-stretching.html',
          'hiit':       'library-hiit.html',
          'cardio':     'library-hiit.html',
          'yoga':       'library-yoga.html',
          'breathwork': 'library-yoga.html',
          'outdoor run':'library-outdoor-runs.html',
          'strength':   'library-strength.html',
          'meditation': 'library-meditation.html',
          'mindful':    'library-meditation.html'
        };
        Object.keys(libMap).forEach(function(k) {
          if (txt.indexOf(k) !== -1) {
            e.preventDefault(); window.location.href = libMap[k]; return;
          }
        });
      }

      /* Profile → overlays */
      if (PAGE.indexOf('profile') !== -1) {
        if (txt.indexOf('notification') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
        if (txt.indexOf('energy') !== -1) {
          e.preventDefault(); window.location.href = 'energy.html'; return;
        }
        if (txt.indexOf('about') !== -1) {
          e.preventDefault(); window.location.href = 'about.html'; return;
        }
        if (txt.indexOf('training type') !== -1 || txt.indexOf('preferred') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
      }

      /* Library / Overlay → retour */
      if (/(library|session|celebration|notification|energy|about|notification)/.test(PAGE)) {
        var isBackEl = (txt === '' || txt === '←' || txt === '‹' || txt === 'back') &&
                       (el.tagName === 'BUTTON' || el.tagName === 'A');
        var hasBackImg = el.querySelector && el.querySelector('img[alt*="back"], img[alt*="Back"], img[alt*="arrow"], img[alt*="Arrow"]');
        if (isBackEl || hasBackImg) {
          e.preventDefault(); window.history.back(); return;
        }
      }

      el = el.parentElement;
    }
  });

  /* ── 3. ONBOARDING : sélection énergie + lieu ── */
  if (PAGE === 'onboarding.html') {
    window._sportedgeEnergy   = 'medium';
    window._sportedgeLocation = 'indoor';

    document.querySelectorAll('button, [class*="rounded"]').forEach(function(btn) {
      var txt = (btn.innerText || '').trim().toLowerCase();
      if (txt.indexOf('low') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'low';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('high') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'high';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('medium') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'medium';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('trainer') !== -1 || txt.indexOf('outdoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'outdoor';
          highlightSel(btn, 'location');
        });
      } else if (txt.indexOf('mat') !== -1 || txt.indexOf('indoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'indoor';
          highlightSel(btn, 'location');
        });
      }
    });

    /* CTA footer onboarding */
    var footerBtn = document.querySelector('footer button');
    if (footerBtn) {
      footerBtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var e2 = window._sportedgeEnergy;
        var l  = window._sportedgeLocation;
        window.location.href = (l === 'outdoor')
          ? 'home-' + e2 + '-outdoor.html'
          : 'home-' + e2 + '.html';
      });
    }
  }

  function highlightSel(el, group) {
    var sel = '[data-group="' + group + '"]';
    document.querySelectorAll(sel).forEach(function(b) {
      b.style.borderColor = 'transparent';
      b.style.backgroundColor = '#F6F5F3';
    });
    el.dataset.group = group;
    el.style.borderColor = '#EC9679';
    el.style.backgroundColor = '#FDF4F2';
  }

})();
</script>

</body>
</html>
