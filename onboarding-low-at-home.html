<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Move - Daily Movement Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #6A5E53;
      background-color: #FBFAF9;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #1D1A16;
    }

    * {
      transition: all 0.2s ease;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .text-balance {
      text-wrap: balance;
    }

    .soft-shadow {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
    }

    .active-selection-ring {
      outline: 2px solid #EC9679;
      outline-offset: -2px;
    }

    .gradient-bg {
      background: linear-gradient(180deg, #FDF4F2 0%, rgba(253, 244, 242, 0) 100%);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">

  <!-- Main Container -->
  <main class="relative w-full max-w-5xl min-h-screen flex flex-col lg:flex-row">
    
    <!-- Background Gradient (Mobile Only) -->
    <div class="absolute top-0 left-0 w-full h-[464px] gradient-bg opacity-50 pointer-events-none lg:hidden"></div>

    <!-- Left Section: Branding & Hero (Desktop Sidebar) -->
    <section class="relative z-10 w-full lg:w-2/5 px-6 pt-12 pb-8 lg:py-20 flex flex-col items-center lg:items-start lg:justify-center lg:sticky lg:top-0 lg:h-screen">
      <!-- Logo Icon -->
      <div class="w-[72px] h-[72px] bg-[#EC9679] rounded-[14px] flex items-center justify-center mb-6 shadow-lg">
        <img class="w-12 h-12 text-white" src="./assets-onboarding-low-at-home/IMG_3.svg" alt="Logo Icon">
      </div>
      
      <div class="text-center lg:text-left">
        <h1 class="text-[20px] lg:text-[32px] leading-tight font-medium mb-2">Move a little. Every day.</h1>
        <p class="text-[14px] lg:text-[18px] text-[#6A5E53]/60 max-w-[290px] lg:max-w-md mx-auto lg:mx-0">
          Small steps lead to big changes. Let's find your movement today.
        </p>
      </div>
    </section>

    <!-- Right Section: Form/Selection Area -->
    <section class="relative z-10 w-full lg:w-3/5 px-5 pb-32 lg:py-20 lg:px-12">
      
      <!-- Step 1: Energy -->
      <div class="mb-10">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-[18px] lg:text-[22px] font-bold">How's your energy?</h2>
          <span class="bg-[#F6F5F3] px-3 py-1 rounded-full text-[12px] font-semibold">Step 1/2</span>
        </div>

        <div class="space-y-3">
          <!-- Low Energy (Selected) -->
          <button class="w-full flex items-center p-[18px] bg-[#FBEAE4] rounded-[26px] border-2 border-[#EC9679] shadow-sm text-left group hover:scale-[1.01]">
            <div class="w-9 h-9 bg-[#EC9679] rounded-full flex items-center justify-center mr-4 shrink-0">
              <img class="w-5 h-5" src="./assets-onboarding-low-at-home/IMG_4.svg" alt="Low Battery">
            </div>
            <div>
              <h3 class="text-[16px] font-semibold text-[#1D1A16]">Low</h3>
              <p class="text-[12px] text-[#6A5E53]">Gentle, slow micro-movements</p>
            </div>
          </button>

          <!-- Medium Energy -->
          <button class="w-full flex items-center p-[18px] bg-[#F6F5F3] rounded-[26px] text-left group hover:bg-[#FBEAE4]/50 hover:scale-[1.01]">
            <div class="w-9 h-9 bg-[#F6F5F3] group-hover:bg-white rounded-full flex items-center justify-center mr-4 shrink-0">
              <img class="w-5 h-5" src="./assets-onboarding-low-at-home/IMG_5.svg" alt="Coffee">
            </div>
            <div>
              <h3 class="text-[16px] font-semibold text-[#1D1A16]">Medium</h3>
              <p class="text-[12px] text-[#6A5E53]">Balanced flow for the day</p>
            </div>
          </button>

          <!-- High Energy -->
          <button class="w-full flex items-center p-[18px] bg-[#F6F5F3] rounded-[26px] text-left group hover:bg-[#FBEAE4]/50 hover:scale-[1.01]">
            <div class="w-9 h-9 bg-[#F6F5F3] group-hover:bg-white rounded-full flex items-center justify-center mr-4 shrink-0">
              <img class="w-5 h-5" src="./assets-onboarding-low-at-home/IMG_3.svg" alt="High Energy">
            </div>
            <div>
              <h3 class="text-[16px] font-semibold text-[#1D1A16]">High</h3>
              <p class="text-[12px] text-[#6A5E53]">Power up and get moving</p>
            </div>
          </button>
        </div>
      </div>

      <!-- Step 2: Vibe -->
      <div class="mb-12">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-[18px] lg:text-[22px] font-bold">What is the vibe today?</h2>
          <span class="bg-[#F6F5F3] px-3 py-1 rounded-full text-[12px] font-semibold">Step 2/2</span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <!-- Fitness Mat (Selected) -->
          <button class="flex flex-col items-center justify-center p-5 bg-[#FBEAE4] rounded-[26px] border-2 border-[#EC9679] shadow-sm text-center group hover:scale-[1.01]">
            <div class="flex items-center gap-2 mb-1">
              <img class="w-6 h-6" src="./assets-onboarding-low-at-home/IMG_6.svg" alt="Fitness Mat">
              <h3 class="text-[16px] font-bold text-[#171A1F]">Fitness Mat</h3>
            </div>
            <p class="text-[12px] text-[#6A5E53]">Indoors or outdoors</p>
          </button>

          <!-- Trainers -->
          <button class="flex flex-col items-center justify-center p-5 bg-[#F6F5F3] rounded-[26px] text-center group hover:bg-[#FBEAE4]/50 hover:scale-[1.01]">
            <div class="flex items-center gap-2 mb-1">
              <img class="w-6 h-6" src="./assets-onboarding-low-at-home/IMG_7.svg" alt="Trainers">
              <h3 class="text-[16px] font-bold text-[#171A1F]">Trainers</h3>
            </div>
            <p class="text-[12px] text-[#6A5E53]">Outdoors</p>
          </button>
        </div>
      </div>

      <!-- Footer Actions -->
      <div class="flex flex-col items-center space-y-6">
        <p class="text-[12px] text-[#6A5E53] text-center max-w-[250px] lg:max-w-md">
          By continuing, you agree to our gentle approach to fitness.
        </p>
        
        <button class="w-full max-w-[400px] h-16 bg-[#EC9679] rounded-full flex items-center justify-center gap-2 shadow-md hover:shadow-lg hover:brightness-105 active:scale-95">
          <span class="text-[18px] font-bold text-[#1D1A16]">Start now – no commitment</span>
          <img class="w-5 h-5" src="./assets-onboarding-low-at-home/IMG_8.svg" alt="Arrow Right">
        </button>
      </div>

    </section>
  </main>

  <!-- Mobile Status Bar (Visual only, as per screenshot) -->
  <div class="fixed top-0 left-0 w-full h-10 flex justify-between items-center px-6 z-50 pointer-events-none lg:hidden">
    <img src="./assets-onboarding-low-at-home/IMG_1.svg" alt="Time" class="h-10">
    <img src="./assets-onboarding-low-at-home/IMG_2.svg" alt="Status Icons" class="h-10">
  </div>




<script>
/* SportEdge Navigation v2 — onboarding-low-at-home.html */
(function() {
  var PAGE = 'onboarding-low-at-home.html';
  var IS_OUTDOOR = false;

  /* ── 1. BOTTOM NAV ── */
  var NAV_MAP = {
    'home':       'home-medium.html',
    'move':       'home-medium.html',
    'progress':   'progress.html',
    'activities': 'activities.html',
    'profile':    'profile.html',
    'bolt':       'bolt.html'
  };

  document.querySelectorAll('nav a, nav button').forEach(function(el) {
    var txt = el.innerText.trim().toLowerCase();
    var alt = (el.querySelector('img') || {}).alt || '';
    alt = alt.toLowerCase();
    Object.keys(NAV_MAP).forEach(function(k) {
      if (txt.indexOf(k) !== -1 || alt.indexOf(k) !== -1) {
        el.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = NAV_MAP[k];
        });
      }
    });
  });

  /* ── 2. DELEGATION GLOBALE sur tout le document ── */
  document.addEventListener('click', function(e) {
    var el = e.target;
    // Remonter jusqu'à 5 niveaux pour trouver le conteneur cliquable
    for (var i = 0; i < 5; i++) {
      if (!el || el === document.body) break;
      var txt = (el.innerText || '').trim().toLowerCase();

      /* CTA principaux */
      if (/(start now|let.s go|start session|begin|commencer)/.test(txt)) {
        e.preventDefault();
        if (PAGE === 'onboarding.html') {
          var energy = window._sportedgeEnergy || 'medium';
          var loc    = window._sportedgeLocation || 'indoor';
          if (loc === 'outdoor') {
            window.location.href = 'home-' + energy + '-outdoor.html';
          } else {
            window.location.href = 'home-' + energy + '.html';
          }
        } else {
          window.location.href = 'home-medium.html';
        }
        return;
      }

      /* Post-session / Done */
      if (/(done|finish|complete|great job|i did it|well done)/.test(txt) && txt.length < 40) {
        e.preventDefault(); window.location.href = 'celebration.html'; return;
      }

      /* Back to home / Return */
      if (/(back to home|go home|return home)/.test(txt)) {
        e.preventDefault(); window.location.href = 'home-medium.html'; return;
      }

      /* Save / Confirm overlays */
      if (/^save/.test(txt) || txt === 'save preferences' || txt === 'confirm') {
        e.preventDefault(); window.location.href = 'profile.html'; return;
      }

      /* Activities → Libraries */
      if (PAGE.indexOf('activities') !== -1 || PAGE.indexOf('od-activities') !== -1) {
        var libMap = {
          'stretching': 'library-stretching.html',
          'hiit':       'library-hiit.html',
          'cardio':     'library-hiit.html',
          'yoga':       'library-yoga.html',
          'breathwork': 'library-yoga.html',
          'outdoor run':'library-outdoor-runs.html',
          'strength':   'library-strength.html',
          'meditation': 'library-meditation.html',
          'mindful':    'library-meditation.html'
        };
        Object.keys(libMap).forEach(function(k) {
          if (txt.indexOf(k) !== -1) {
            e.preventDefault(); window.location.href = libMap[k]; return;
          }
        });
      }

      /* Profile → overlays */
      if (PAGE.indexOf('profile') !== -1) {
        if (txt.indexOf('notification') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
        if (txt.indexOf('energy') !== -1) {
          e.preventDefault(); window.location.href = 'energy.html'; return;
        }
        if (txt.indexOf('about') !== -1) {
          e.preventDefault(); window.location.href = 'about.html'; return;
        }
        if (txt.indexOf('training type') !== -1 || txt.indexOf('preferred') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
      }

      /* Library / Overlay → retour */
      if (/(library|session|celebration|notification|energy|about|notification)/.test(PAGE)) {
        var isBackEl = (txt === '' || txt === '←' || txt === '‹' || txt === 'back') &&
                       (el.tagName === 'BUTTON' || el.tagName === 'A');
        var hasBackImg = el.querySelector && el.querySelector('img[alt*="back"], img[alt*="Back"], img[alt*="arrow"], img[alt*="Arrow"]');
        if (isBackEl || hasBackImg) {
          e.preventDefault(); window.history.back(); return;
        }
      }

      el = el.parentElement;
    }
  });

  /* ── 3. ONBOARDING : sélection énergie + lieu ── */
  if (PAGE === 'onboarding.html') {
    window._sportedgeEnergy   = 'medium';
    window._sportedgeLocation = 'indoor';

    document.querySelectorAll('button, [class*="rounded"]').forEach(function(btn) {
      var txt = (btn.innerText || '').trim().toLowerCase();
      if (txt.indexOf('low') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'low';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('high') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'high';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('medium') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'medium';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('trainer') !== -1 || txt.indexOf('outdoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'outdoor';
          highlightSel(btn, 'location');
        });
      } else if (txt.indexOf('mat') !== -1 || txt.indexOf('indoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'indoor';
          highlightSel(btn, 'location');
        });
      }
    });

    /* CTA footer onboarding */
    var footerBtn = document.querySelector('footer button');
    if (footerBtn) {
      footerBtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var e2 = window._sportedgeEnergy;
        var l  = window._sportedgeLocation;
        window.location.href = (l === 'outdoor')
          ? 'home-' + e2 + '-outdoor.html'
          : 'home-' + e2 + '.html';
      });
    }
  }

  function highlightSel(el, group) {
    var sel = '[data-group="' + group + '"]';
    document.querySelectorAll(sel).forEach(function(b) {
      b.style.borderColor = 'transparent';
      b.style.backgroundColor = '#F6F5F3';
    });
    el.dataset.group = group;
    el.style.borderColor = '#EC9679';
    el.style.backgroundColor = '#FDF4F2';
  }

})();
</script>

</body>
</html>
