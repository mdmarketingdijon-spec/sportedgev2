<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>RapidAPI ExerciseDB Test</title></head>
<body style="font-family:sans-serif;padding:20px;">
<h2>Test ExerciseDB RapidAPI</h2>
<p id="status">Testing API...</p>
<div id="results" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;"></div>
<script>
var API_KEY = 'decea1e981mshaa417cf0edc7912p1f53c3jsn09df27ecfa84';

// Test 1 : status
fetch('https://exercisedb.p.rapidapi.com/status', {
  headers: {
    'x-rapidapi-key': API_KEY,
    'x-rapidapi-host': 'exercisedb.p.rapidapi.com'
  }
})
.then(r => r.json())
.then(d => {
  document.getElementById('status').textContent = '✓ API OK: ' + JSON.stringify(d);
  // Charger quelques exercices
  return fetch('https://exercisedb.p.rapidapi.com/exercises?limit=6&offset=0', {
    headers: {
      'x-rapidapi-key': API_KEY,
      'x-rapidapi-host': 'exercisedb.p.rapidapi.com'
    }
  });
})
.then(r => r.json())
.then(data => {
  var results = document.getElementById('results');
  (Array.isArray(data) ? data : data.exercises || []).slice(0,6).forEach(ex => {
    var d = document.createElement('div');
    d.style.cssText = 'background:#f9f8f6;border-radius:12px;padding:10px;text-align:center;border:1px solid #e4e0dc';
    d.innerHTML = '<img src="'+ex.gifUrl+'" style="width:100%;height:160px;object-fit:cover;border-radius:8px;" onerror="this.parentElement.style.background='#fee'">'
      + '<p style="font-size:12px;margin:6px 0 2px;font-weight:500">'+ex.name+'</p>'
      + '<p style="font-size:11px;color:#888">'+ex.target+' · '+ex.equipment+'</p>';
    results.appendChild(d);
  });
})
.catch(e => {
  document.getElementById('status').textContent = '✗ FAILED: ' + e.message;
});
</script>
</body></html>
