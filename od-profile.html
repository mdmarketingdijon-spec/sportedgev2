<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportEdge - Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1D1A16;
      background-color: #FBFAF9;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    * {
      transition: all 0.2s ease;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .text-subtle {
      color: #6A5E53;
    }

    .activity-dot-active {
      background-color: #EC9679;
      box-shadow: 0 4px 12px rgba(236, 150, 121, 0.3);
    }

    .activity-dot-empty {
      border: 2px dashed rgba(106, 94, 83, 0.2);
      background-color: transparent;
    }

    .nav-blur {
      background: rgba(251, 250, 249, 0.9);
      backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid rgba(228, 224, 220, 1);
    }

    .section-label {
      font-family: "Outfit", sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6A5E53;
    }

    .avatar-glow {
      background: #EC9679;
      filter: blur(24px);
      opacity: 0.2;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row">

  <!-- Desktop Sidebar Navigation -->
  <aside class="hidden lg:flex flex-col w-64 h-screen sticky top-0 bg-white border-r border-[#E4E0DC] p-6">
    <div class="mb-10 px-2">
      <h1 class="text-2xl text-[#EC9679]">SportEdge</h1>
    </div>
    <nav class="flex-1 space-y-2">
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-[#6A5E53] hover:bg-[#F6F5F3]">
        <iconify-icon icon="lucide:house" width="24"></iconify-icon>
        <span class="font-medium">Home</span>
      </a>
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-[#6A5E53] hover:bg-[#F6F5F3]">
        <iconify-icon icon="lucide:chart-no-axes-column" width="24"></iconify-icon>
        <span class="font-medium">Progress</span>
      </a>
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-[#6A5E53] hover:bg-[#F6F5F3]">
        <iconify-icon icon="lucide:message-circle" width="24"></iconify-icon>
        <span class="font-medium">Bolt</span>
      </a>
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-[#6A5E53] hover:bg-[#F6F5F3]">
        <iconify-icon icon="lucide:activity" width="24"></iconify-icon>
        <span class="font-medium">Activities</span>
      </a>
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-[#FDF4F2] text-[#EC9679]">
        <iconify-icon icon="lucide:user" width="24"></iconify-icon>
        <span class="font-weight-bold">Profile</span>
      </a>
    </nav>
    <div class="mt-auto pt-6 border-t border-[#E4E0DC]">
      <p class="text-[10px] text-[#6A5E53]/60 text-center">Version 1.2.4</p>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col min-h-screen pb-20 lg:pb-0">
    
    <!-- Mobile Header -->
    <header class="lg:hidden sticky top-0 z-50 bg-[#FBFAF9] border-b border-[#E4E0DC] px-4 h-16 flex items-center justify-center">
      <h2 class="text-lg font-semibold">Profile</h2>
    </header>

    <!-- Content Container -->
    <div class="max-w-4xl mx-auto w-full px-5 py-8 md:py-12">
      
      <!-- Profile Section -->
      <section class="flex flex-col items-center text-center mb-10">
        <div class="relative mb-4">
          <div class="absolute inset-0 avatar-glow rounded-full"></div>
          <div class="relative w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-sm">
            <img src="./assets-od-profile/IMG_3.webp" alt="Alex" class="w-full h-full object-cover">
          </div>
        </div>
        <h1 class="text-2xl md:text-3xl mb-1">Alex</h1>
        <p class="text-subtle text-sm font-medium">Moving a little, every day. ✨</p>
      </section>

      <!-- Stats Grid -->
      <section class="grid grid-cols-3 gap-3 md:gap-6 mb-8">
        <!-- Sessions -->
        <div class="bg-[#FDF4F2] border border-[#EC9679]/10 rounded-[26px] p-4 flex flex-col items-center justify-center aspect-square md:aspect-auto md:py-6">
          <img src="./assets-od-profile/IMG_4.svg" alt="Trophy" class="w-4 h-4 mb-2 opacity-70">
          <span class="text-lg md:text-2xl font-bold text-[#43180A]">12</span>
          <span class="text-[10px] font-bold tracking-widest uppercase text-[#43180A]/60 mt-1">Sessions</span>
        </div>
        <!-- Streak -->
        <div class="bg-[#F2FDF9] border border-[#67E4BB]/10 rounded-[26px] p-4 flex flex-col items-center justify-center aspect-square md:aspect-auto md:py-6">
          <img src="./assets-od-profile/IMG_5.svg" alt="Flame" class="w-4 h-4 mb-2 opacity-70">
          <span class="text-lg md:text-2xl font-bold text-[#0B412F]">4 Days</span>
          <span class="text-[10px] font-bold tracking-widest uppercase text-[#0B412F]/60 mt-1">Streak</span>
        </div>
        <!-- Favorite -->
        <div class="bg-[#F6F2FD] border border-[#B093EC]/10 rounded-[26px] p-4 flex flex-col items-center justify-center aspect-square md:aspect-auto md:py-6">
          <img src="./assets-od-profile/IMG_6.svg" alt="Heart" class="w-4 h-4 mb-2 opacity-70">
          <span class="text-lg md:text-2xl font-bold text-[#1d0b41]">Stretch</span>
          <span class="text-[10px] font-bold tracking-widest uppercase text-[#1d0b41]/60 mt-1">Fav</span>
        </div>
      </section>

      <!-- Weekly Activity Card -->
      <section class="bg-[#F6F5F3]/50 rounded-[24px] p-5 shadow-sm mb-10 border border-white/50">
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-2">
            <img src="./assets-od-profile/IMG_7.svg" alt="Calendar" class="w-4 h-4">
            <h3 class="text-sm font-semibold">Weekly Activity</h3>
          </div>
          <span class="text-[10px] font-medium px-3 py-1 bg-[#EC9679]/5 border border-[#EC9679]/20 rounded-full">4/7 Days</span>
        </div>

        <div class="flex justify-between items-center px-1">
          <!-- Mon -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-[10px] font-bold text-subtle">M</span>
            <div class="w-8 h-8 rounded-full activity-dot-active flex items-center justify-center">
              <img src="./assets-od-profile/IMG_8.svg" alt="Check" class="w-4 h-4">
            </div>
          </div>
          <!-- Tue -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-[10px] font-bold text-subtle">T</span>
            <div class="w-8 h-8 rounded-full activity-dot-active flex items-center justify-center">
              <img src="./assets-od-profile/IMG_8.svg" alt="Check" class="w-4 h-4">
            </div>
          </div>
          <!-- Wed -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-[10px] font-bold text-subtle">W</span>
            <div class="w-8 h-8 rounded-full activity-dot-empty"></div>
          </div>
          <!-- Thu -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-[10px] font-bold text-subtle">T</span>
            <div class="w-8 h-8 rounded-full activity-dot-active flex items-center justify-center">
              <img src="./assets-od-profile/IMG_8.svg" alt="Check" class="w-4 h-4">
            </div>
          </div>
          <!-- Fri -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-[10px] font-bold text-subtle">F</span>
            <div class="w-8 h-8 rounded-full activity-dot-active flex items-center justify-center">
              <img src="./assets-od-profile/IMG_8.svg" alt="Check" class="w-4 h-4">
            </div>
          </div>
          <!-- Sat -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-[10px] font-bold text-subtle">S</span>
            <div class="w-8 h-8 rounded-full activity-dot-empty"></div>
          </div>
          <!-- Sun -->
          <div class="flex flex-col items-center gap-2">
            <span class="text-[10px] font-bold text-subtle">S</span>
            <div class="w-8 h-8 rounded-full activity-dot-empty"></div>
          </div>
        </div>
      </section>

      <!-- App Settings -->
      <section>
        <h4 class="section-label mb-4 px-1">App Settings</h4>
        <div class="bg-white rounded-[26px] border border-[#E4E0DC] overflow-hidden">
          <!-- Notifications -->
          <button class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 text-left">
            <div class="w-10 h-10 bg-[#F6F5F3] rounded-2xl flex items-center justify-center shrink-0">
              <img src="./assets-od-profile/IMG_9.svg" alt="Bell" class="w-5 h-5 text-subtle">
            </div>
            <div class="flex-1 flex items-center justify-between">
              <span class="text-sm font-medium">Notifications</span>
              <div class="flex items-center gap-2">
                <span class="text-xs text-subtle">Daily reminder</span>
                <img src="./assets-od-profile/IMG_10.svg" alt="Arrow" class="w-4 h-4 opacity-50">
              </div>
            </div>
          </button>
          
          <div class="mx-4 border-t border-[#E4E0DC]/50"></div>

          <!-- Energy Level -->
          <button class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 text-left">
            <div class="w-10 h-10 bg-[#F6F5F3] rounded-2xl flex items-center justify-center shrink-0">
              <img src="./assets-od-profile/IMG_5.svg" alt="Flame" class="w-5 h-5 text-subtle">
            </div>
            <div class="flex-1 flex items-center justify-between">
              <span class="text-sm font-medium">Energy level default</span>
              <div class="flex items-center gap-2">
                <span class="text-xs text-subtle">Medium</span>
                <img src="./assets-od-profile/IMG_10.svg" alt="Arrow" class="w-4 h-4 opacity-50">
              </div>
            </div>
          </button>

          <div class="mx-4 border-t border-[#E4E0DC]/50"></div>

          <!-- About -->
          <button class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 text-left">
            <div class="w-10 h-10 bg-[#F6F5F3] rounded-2xl flex items-center justify-center shrink-0">
              <img src="./assets-od-profile/IMG_11.svg" alt="Info" class="w-5 h-5 text-subtle">
            </div>
            <div class="flex-1 flex items-center justify-between">
              <span class="text-sm font-medium">About SportEdge</span>
              <img src="./assets-od-profile/IMG_10.svg" alt="Arrow" class="w-4 h-4 opacity-50">
            </div>
          </button>
        </div>
      </section>

      <!-- Footer Info -->
      <footer class="mt-12 text-center">
        <p class="text-[10px] text-[#6A5E53]/60">SportEdge Version 1.2.4 • Made for tiny victories</p>
      </footer>
    </div>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="lg:hidden fixed bottom-0 left-0 right-0 h-16 nav-blur flex items-center justify-around px-2 z-50">
    <a href="#" class="flex flex-col items-center gap-1 text-[#565d6d]">
      <img src="./assets-od-profile/IMG_12.svg" alt="Home" class="w-6 h-6">
      <span class="text-[10px]">Home</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-[#565d6d]">
      <img src="./assets-od-profile/IMG_13.svg" alt="Progress" class="w-6 h-6">
      <span class="text-[10px]">Progress</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-[#565d6d]">
      <img src="./assets-od-profile/IMG_14.svg" alt="Bolt" class="w-6 h-6">
      <span class="text-[10px]">Bolt</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-[#565d6d]">
      <img src="./assets-od-profile/IMG_15.svg" alt="Activities" class="w-6 h-6">
      <span class="text-[10px]">Activities</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-[#EC9679]">
      <img src="./assets-od-profile/IMG_16.svg" alt="Profile" class="w-6 h-6">
      <span class="text-[10px] font-bold">Profile</span>
    </a>
  </nav>




<script>
/* SportEdge Navigation v2 — od-profile.html */
(function() {
  var PAGE = 'od-profile.html';
  var IS_OUTDOOR = true;

  /* ── 1. BOTTOM NAV ── */
  var NAV_MAP = {
    'home':       'od-home-medium.html',
    'move':       'od-home-medium.html',
    'progress':   'od-progress.html',
    'activities': 'od-activities.html',
    'profile':    'od-profile.html',
    'bolt':       'od-bolt.html'
  };

  document.querySelectorAll('nav a, nav button').forEach(function(el) {
    var txt = el.innerText.trim().toLowerCase();
    var alt = (el.querySelector('img') || {}).alt || '';
    alt = alt.toLowerCase();
    Object.keys(NAV_MAP).forEach(function(k) {
      if (txt.indexOf(k) !== -1 || alt.indexOf(k) !== -1) {
        el.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = NAV_MAP[k];
        });
      }
    });
  });

  /* ── 2. DELEGATION GLOBALE sur tout le document ── */
  document.addEventListener('click', function(e) {
    var el = e.target;
    // Remonter jusqu'à 5 niveaux pour trouver le conteneur cliquable
    for (var i = 0; i < 5; i++) {
      if (!el || el === document.body) break;
      var txt = (el.innerText || '').trim().toLowerCase();

      /* CTA principaux */
      if (/(start now|let.s go|start session|begin|commencer)/.test(txt)) {
        e.preventDefault();
        if (PAGE === 'onboarding.html') {
          var energy = window._sportedgeEnergy || 'medium';
          var loc    = window._sportedgeLocation || 'indoor';
          if (loc === 'outdoor') {
            window.location.href = 'home-' + energy + '-outdoor.html';
          } else {
            window.location.href = 'home-' + energy + '.html';
          }
        } else {
          window.location.href = 'od-home-medium.html';
        }
        return;
      }

      /* Post-session / Done */
      if (/(done|finish|complete|great job|i did it|well done)/.test(txt) && txt.length < 40) {
        e.preventDefault(); window.location.href = 'celebration.html'; return;
      }

      /* Back to home / Return */
      if (/(back to home|go home|return home)/.test(txt)) {
        e.preventDefault(); window.location.href = 'od-home-medium.html'; return;
      }

      /* Save / Confirm overlays */
      if (/^save/.test(txt) || txt === 'save preferences' || txt === 'confirm') {
        e.preventDefault(); window.location.href = 'od-profile.html'; return;
      }

      /* Activities → Libraries */
      if (PAGE.indexOf('activities') !== -1 || PAGE.indexOf('od-activities') !== -1) {
        var libMap = {
          'stretching': 'od-library-stretching.html',
          'hiit':       'od-library-hiit.html',
          'cardio':     'od-library-hiit.html',
          'yoga':       'od-library-yoga.html',
          'breathwork': 'od-library-yoga.html',
          'outdoor run':'od-library-outdoor-runs.html',
          'strength':   'od-library-strength.html',
          'meditation': 'od-library-meditation.html',
          'mindful':    'od-library-meditation.html'
        };
        Object.keys(libMap).forEach(function(k) {
          if (txt.indexOf(k) !== -1) {
            e.preventDefault(); window.location.href = libMap[k]; return;
          }
        });
      }

      /* Profile → overlays */
      if (PAGE.indexOf('profile') !== -1) {
        if (txt.indexOf('notification') !== -1) {
          e.preventDefault(); window.location.href = 'od-notifications.html'; return;
        }
        if (txt.indexOf('energy') !== -1) {
          e.preventDefault(); window.location.href = 'od-energy.html'; return;
        }
        if (txt.indexOf('about') !== -1) {
          e.preventDefault(); window.location.href = 'od-about.html'; return;
        }
        if (txt.indexOf('training type') !== -1 || txt.indexOf('preferred') !== -1) {
          e.preventDefault(); window.location.href = 'od-notifications.html'; return;
        }
      }

      /* Library / Overlay → retour */
      if (/(library|session|celebration|notification|energy|about|notification)/.test(PAGE)) {
        var isBackEl = (txt === '' || txt === '←' || txt === '‹' || txt === 'back') &&
                       (el.tagName === 'BUTTON' || el.tagName === 'A');
        var hasBackImg = el.querySelector && el.querySelector('img[alt*="back"], img[alt*="Back"], img[alt*="arrow"], img[alt*="Arrow"]');
        if (isBackEl || hasBackImg) {
          e.preventDefault(); window.history.back(); return;
        }
      }

      el = el.parentElement;
    }
  });

  /* ── 3. ONBOARDING : sélection énergie + lieu ── */
  if (PAGE === 'onboarding.html') {
    window._sportedgeEnergy   = 'medium';
    window._sportedgeLocation = 'indoor';

    document.querySelectorAll('button, [class*="rounded"]').forEach(function(btn) {
      var txt = (btn.innerText || '').trim().toLowerCase();
      if (txt.indexOf('low') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'low';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('high') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'high';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('medium') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'medium';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('trainer') !== -1 || txt.indexOf('outdoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'outdoor';
          highlightSel(btn, 'location');
        });
      } else if (txt.indexOf('mat') !== -1 || txt.indexOf('indoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'indoor';
          highlightSel(btn, 'location');
        });
      }
    });

    /* CTA footer onboarding */
    var footerBtn = document.querySelector('footer button');
    if (footerBtn) {
      footerBtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var e2 = window._sportedgeEnergy;
        var l  = window._sportedgeLocation;
        window.location.href = (l === 'outdoor')
          ? 'home-' + e2 + '-outdoor.html'
          : 'home-' + e2 + '.html';
      });
    }
  }

  function highlightSel(el, group) {
    var sel = '[data-group="' + group + '"]';
    document.querySelectorAll(sel).forEach(function(b) {
      b.style.borderColor = 'transparent';
      b.style.backgroundColor = '#F6F5F3';
    });
    el.dataset.group = group;
    el.style.borderColor = '#EC9679';
    el.style.backgroundColor = '#FDF4F2';
  }

})();
</script>

</body>
</html>
