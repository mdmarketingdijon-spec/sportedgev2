<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Move - Daily Movement Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1a1a1a;
      background-color: #FBFAF9;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #1D1A16;
    }

    * {
      transition: all 0.2s ease;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .text-balance {
      text-wrap: balance;
    }

    .tap-highlight-none {
      -webkit-tap-highlight-color: transparent;
    }

    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }

    .gradient-bg {
      background: linear-gradient(180deg, #FDF4F2 0%, rgba(253, 244, 242, 0) 100%);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#EC9679',
              secondary: '#FBEAE4',
              muted: '#6A5E53',
              bg: '#F6F5F3',
              dark: '#1D1A16'
            }
          },
          borderRadius: {
            '3xl': '26px',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex flex-col items-center">

  <!-- Background Gradient -->
  <div class="fixed top-0 left-0 w-full h-[464px] gradient-bg opacity-50 pointer-events-none -z-10"></div>

  <!-- Main Content Wrapper -->
  <main class="w-full max-w-2xl px-5 py-8 md:py-12 flex flex-col gap-8 md:gap-12">
    
    <!-- Header Section -->
    <header class="flex flex-col items-center text-center space-y-4">
      <div class="w-[72px] h-[72px] bg-brand-primary rounded-[14px] flex items-center justify-center shadow-lg shadow-brand-primary/20">
        <img src="./assets-onboarding-1/IMG_3.svg" alt="Zap Icon" class="w-12 h-12 text-white">
      </div>
      <div class="space-y-2">
        <h1 class="text-[20px] md:text-3xl font-medium text-brand-muted">Move a little. Every day.</h1>
        <p class="text-sm md:text-base text-brand-muted/60 max-w-[290px] md:max-w-md mx-auto leading-relaxed">
          Small steps lead to big changes. Let's find your movement today.
        </p>
      </div>
    </header>

    <!-- Step 1: Energy Selection -->
    <section class="space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg md:text-xl font-bold">How's your energy?</h2>
        <span class="px-3 py-1 bg-brand-bg rounded-full text-[12px] font-semibold text-brand-muted">Step 1/2</span>
      </div>

      <div class="grid grid-cols-1 gap-3">
        <!-- Low Energy Card -->
        <button class="flex items-center p-[18px] bg-brand-bg rounded-3xl text-left hover:bg-brand-secondary/50 group">
          <div class="w-9 h-9 bg-brand-bg rounded-full flex items-center justify-center mr-4 group-hover:bg-white">
            <img src="./assets-onboarding-1/IMG_4.svg" alt="Battery Low" class="w-5 h-5 opacity-60">
          </div>
          <div>
            <h3 class="text-base font-semibold text-brand-dark">Low</h3>
            <p class="text-[12px] text-brand-muted">Gentle, slow micro-movements</p>
          </div>
        </button>

        <!-- Medium Energy Card (Selected) -->
        <button class="flex items-center p-[18px] bg-brand-secondary rounded-3xl text-left border-2 border-brand-primary shadow-sm relative">
          <div class="w-9 h-9 bg-brand-primary rounded-full flex items-center justify-center mr-4">
            <img src="./assets-onboarding-1/IMG_5.svg" alt="Coffee" class="w-5 h-5">
          </div>
          <div>
            <h3 class="text-base font-semibold text-brand-dark">Medium</h3>
            <p class="text-[12px] text-brand-muted">Balanced flow for the day</p>
          </div>
        </button>

        <!-- High Energy Card -->
        <button class="flex items-center p-[18px] bg-brand-bg rounded-3xl text-left hover:bg-brand-secondary/50 group">
          <div class="w-9 h-9 bg-brand-bg rounded-full flex items-center justify-center mr-4 group-hover:bg-white">
            <img src="./assets-onboarding-1/IMG_3.svg" alt="High Energy" class="w-5 h-5 opacity-60">
          </div>
          <div>
            <h3 class="text-base font-semibold text-brand-dark">High</h3>
            <p class="text-[12px] text-brand-muted">Power up and get moving</p>
          </div>
        </button>
      </div>
    </section>

    <!-- Step 2: Vibe Selection -->
    <section class="space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg md:text-xl font-bold">What is the vibe today?</h2>
        <span class="px-3 py-1 bg-brand-bg rounded-full text-[12px] font-semibold text-brand-muted">Step 2/2</span>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <!-- Fitness Mat Card -->
        <button class="flex flex-col p-[18px] bg-brand-bg rounded-3xl text-left hover:bg-brand-secondary/50 group border-2 border-transparent">
          <div class="flex items-center gap-2 mb-1">
            <img src="./assets-onboarding-1/IMG_6.svg" alt="Fitness Mat" class="w-6 h-6 opacity-60">
            <h3 class="text-base font-bold text-[#171a1f]">Fitness Mat</h3>
          </div>
          <p class="text-[12px] text-brand-muted ml-8">Indoors or outdoors</p>
        </button>

        <!-- Trainers Card -->
        <button class="flex flex-col p-[18px] bg-brand-bg rounded-3xl text-left hover:bg-brand-secondary/50 group border-2 border-transparent">
          <div class="flex items-center gap-2 mb-1">
            <img src="./assets-onboarding-1/IMG_7.svg" alt="Trainers" class="w-6 h-6 opacity-60">
            <h3 class="text-base font-bold text-[#171a1f]">Trainers</h3>
          </div>
          <p class="text-[12px] text-brand-muted ml-8">Outdoors</p>
        </button>
      </div>
    </section>

    <!-- Footer Action Section -->
    <footer class="mt-auto pt-8 flex flex-col items-center gap-6 safe-bottom">
      <p class="text-[12px] text-brand-muted text-center max-w-[250px] leading-tight">
        By continuing, you agree to our gentle approach to fitness.
      </p>
      
      <button class="w-full max-w-md h-16 bg-brand-primary rounded-full flex items-center justify-center gap-2 shadow-lg shadow-brand-primary/30 hover:scale-[1.02] active:scale-[0.98] tap-highlight-none">
        <span class="text-[18px] font-bold text-brand-dark">Start now – no commitment</span>
        <img src="./assets-onboarding-1/IMG_8.svg" alt="Arrow Right" class="w-5 h-5">
      </button>
    </footer>
  </main>

  <!-- Desktop Sidebar Enhancement (Visible only on lg+) -->
  <aside class="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-white border-r border-brand-bg p-8 flex-col gap-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-brand-primary rounded-lg flex items-center justify-center">
        <img src="./assets-onboarding-1/IMG_3.svg" alt="Logo" class="w-6 h-6">
      </div>
      <span class="text-xl font-bold font-['Outfit']">Move.</span>
    </div>
    
    <nav class="flex flex-col gap-2">
      <a href="#" class="flex items-center gap-3 p-3 bg-brand-secondary/30 rounded-xl text-brand-primary font-semibold">
        <iconify-icon icon="ph:house-fill" width="24"></iconify-icon>
        Today's Plan
      </a>
      <a href="#" class="flex items-center gap-3 p-3 text-brand-muted hover:bg-brand-bg rounded-xl">
        <iconify-icon icon="ph:chart-line-up" width="24"></iconify-icon>
        Progress
      </a>
      <a href="#" class="flex items-center gap-3 p-3 text-brand-muted hover:bg-brand-bg rounded-xl">
        <iconify-icon icon="ph:user" width="24"></iconify-icon>
        Profile
      </a>
    </nav>

    <div class="mt-auto p-4 bg-brand-bg rounded-2xl">
      <p class="text-xs font-semibold text-brand-muted mb-2">DAILY STREAK</p>
      <div class="flex items-center gap-2">
        <iconify-icon icon="ph:fire-fill" class="text-orange-500" width="24"></iconify-icon>
        <span class="text-lg font-bold">12 Days</span>
      </div>
    </div>
  </aside>




<script>
/* SportEdge Navigation v2 — onboarding-1.html */
(function() {
  var PAGE = 'onboarding-1.html';
  var IS_OUTDOOR = false;

  /* ── 1. BOTTOM NAV ── */
  var NAV_MAP = {
    'home':       'home-medium.html',
    'move':       'home-medium.html',
    'progress':   'progress.html',
    'activities': 'activities.html',
    'profile':    'profile.html',
    'bolt':       'bolt.html'
  };

  document.querySelectorAll('nav a, nav button').forEach(function(el) {
    var txt = el.innerText.trim().toLowerCase();
    var alt = (el.querySelector('img') || {}).alt || '';
    alt = alt.toLowerCase();
    Object.keys(NAV_MAP).forEach(function(k) {
      if (txt.indexOf(k) !== -1 || alt.indexOf(k) !== -1) {
        el.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = NAV_MAP[k];
        });
      }
    });
  });

  /* ── 2. DELEGATION GLOBALE sur tout le document ── */
  document.addEventListener('click', function(e) {
    var el = e.target;
    // Remonter jusqu'à 5 niveaux pour trouver le conteneur cliquable
    for (var i = 0; i < 5; i++) {
      if (!el || el === document.body) break;
      var txt = (el.innerText || '').trim().toLowerCase();

      /* CTA principaux */
      if (/(start now|let.s go|start session|begin|commencer)/.test(txt)) {
        e.preventDefault();
        if (PAGE === 'onboarding.html') {
          var energy = window._sportedgeEnergy || 'medium';
          var loc    = window._sportedgeLocation || 'indoor';
          if (loc === 'outdoor') {
            window.location.href = 'home-' + energy + '-outdoor.html';
          } else {
            window.location.href = 'home-' + energy + '.html';
          }
        } else {
          window.location.href = 'home-medium.html';
        }
        return;
      }

      /* Post-session / Done */
      if (/(done|finish|complete|great job|i did it|well done)/.test(txt) && txt.length < 40) {
        e.preventDefault(); window.location.href = 'celebration.html'; return;
      }

      /* Back to home / Return */
      if (/(back to home|go home|return home)/.test(txt)) {
        e.preventDefault(); window.location.href = 'home-medium.html'; return;
      }

      /* Save / Confirm overlays */
      if (/^save/.test(txt) || txt === 'save preferences' || txt === 'confirm') {
        e.preventDefault(); window.location.href = 'profile.html'; return;
      }

      /* Activities → Libraries */
      if (PAGE.indexOf('activities') !== -1 || PAGE.indexOf('od-activities') !== -1) {
        var libMap = {
          'stretching': 'library-stretching.html',
          'hiit':       'library-hiit.html',
          'cardio':     'library-hiit.html',
          'yoga':       'library-yoga.html',
          'breathwork': 'library-yoga.html',
          'outdoor run':'library-outdoor-runs.html',
          'strength':   'library-strength.html',
          'meditation': 'library-meditation.html',
          'mindful':    'library-meditation.html'
        };
        Object.keys(libMap).forEach(function(k) {
          if (txt.indexOf(k) !== -1) {
            e.preventDefault(); window.location.href = libMap[k]; return;
          }
        });
      }

      /* Profile → overlays */
      if (PAGE.indexOf('profile') !== -1) {
        if (txt.indexOf('notification') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
        if (txt.indexOf('energy') !== -1) {
          e.preventDefault(); window.location.href = 'energy.html'; return;
        }
        if (txt.indexOf('about') !== -1) {
          e.preventDefault(); window.location.href = 'about.html'; return;
        }
        if (txt.indexOf('training type') !== -1 || txt.indexOf('preferred') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
      }

      /* Library / Overlay → retour */
      if (/(library|session|celebration|notification|energy|about|notification)/.test(PAGE)) {
        var isBackEl = (txt === '' || txt === '←' || txt === '‹' || txt === 'back') &&
                       (el.tagName === 'BUTTON' || el.tagName === 'A');
        var hasBackImg = el.querySelector && el.querySelector('img[alt*="back"], img[alt*="Back"], img[alt*="arrow"], img[alt*="Arrow"]');
        if (isBackEl || hasBackImg) {
          e.preventDefault(); window.history.back(); return;
        }
      }

      el = el.parentElement;
    }
  });

  /* ── 3. ONBOARDING : sélection énergie + lieu ── */
  if (PAGE === 'onboarding.html') {
    window._sportedgeEnergy   = 'medium';
    window._sportedgeLocation = 'indoor';

    document.querySelectorAll('button, [class*="rounded"]').forEach(function(btn) {
      var txt = (btn.innerText || '').trim().toLowerCase();
      if (txt.indexOf('low') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'low';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('high') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'high';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('medium') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'medium';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('trainer') !== -1 || txt.indexOf('outdoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'outdoor';
          highlightSel(btn, 'location');
        });
      } else if (txt.indexOf('mat') !== -1 || txt.indexOf('indoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'indoor';
          highlightSel(btn, 'location');
        });
      }
    });

    /* CTA footer onboarding */
    var footerBtn = document.querySelector('footer button');
    if (footerBtn) {
      footerBtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var e2 = window._sportedgeEnergy;
        var l  = window._sportedgeLocation;
        window.location.href = (l === 'outdoor')
          ? 'home-' + e2 + '-outdoor.html'
          : 'home-' + e2 + '.html';
      });
    }
  }

  function highlightSel(el, group) {
    var sel = '[data-group="' + group + '"]';
    document.querySelectorAll(sel).forEach(function(b) {
      b.style.borderColor = 'transparent';
      b.style.backgroundColor = '#F6F5F3';
    });
    el.dataset.group = group;
    el.style.borderColor = '#EC9679';
    el.style.backgroundColor = '#FDF4F2';
  }

})();
</script>

</body>
</html>
