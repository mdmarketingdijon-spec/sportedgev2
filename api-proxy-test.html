<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>API Debug</title></head>
<body style="font-family:monospace;padding:20px;font-size:13px;">
<h2>ExerciseDB API Debug</h2>

<h3>Test 1: Liste des 5 premiers exercices</h3>
<pre id="r1">Loading...</pre>

<h3>Test 2: Body parts disponibles</h3>
<pre id="r2">Loading...</pre>

<h3>Test 3: Recherche "squat"</h3>
<pre id="r3">Loading...</pre>

<script>
function load(id, url) {
  fetch(url)
    .then(r => r.json())
    .then(d => { document.getElementById(id).textContent = JSON.stringify(d, null, 2).substring(0, 1000); })
    .catch(e => { document.getElementById(id).textContent = 'ERROR: ' + e.message; });
}
load('r1', '/api/exercise?debug=list');
load('r2', '/api/exercise?debug=bodyparts');
load('r3', '/api/exercise?name=squat');
</script>
</body></html>
