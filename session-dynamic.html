<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportEdge — Session</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: #FBFAF9; color: #1D1A16; min-height: 100vh; }

  /* ── Timer ring ── */
  .timer-ring { transform: rotate(-90deg); }
  .timer-ring-bg { fill: none; stroke: #E4E0DC; stroke-width: 6; }
  .timer-ring-progress { fill: none; stroke: #EC9679; stroke-width: 6; stroke-linecap: round;
    transition: stroke-dashoffset 1s linear; }

  /* ── Intensity badges ── */
  .badge-low    { background:#DBEAFE; color:#1D4ED8; }
  .badge-medium { background:#EDE9FE; color:#5B21B6; }
  .badge-high   { background:#FEE2E2; color:#B91C1C; }

  /* ── Exercise GIF container ── */
  .gif-container { background: #F6F5F3; border-radius: 20px; overflow: hidden;
    display: flex; align-items: center; justify-content: center; position: relative; }
  .gif-container img { width: 100%; height: 100%; object-fit: contain; }

  /* ── Rest overlay ── */
  .rest-overlay { position: absolute; inset: 0; background: rgba(251,250,249,0.95);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }

  /* ── Progress bar ── */
  .prog-bar { height: 4px; background: #E4E0DC; border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: #EC9679; border-radius: 2px; transition: width 0.5s ease; }

  /* ── Buttons ── */
  .btn-primary { background: #EC9679; color: #1D1A16; font-weight: 600; font-size: 16px;
    padding: 14px 32px; border-radius: 50px; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-primary:hover { background: #d88568; transform: scale(1.02); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: transparent; color: #6A5E53; font-size: 14px; font-weight: 500;
    padding: 10px 20px; border-radius: 50px; border: 1.5px solid #E4E0DC; cursor: pointer; transition: all 0.2s; }
  .btn-secondary:hover { background: #F6F5F3; }

  /* ── Completed overlay ── */
  .completed-screen { display: none; position: fixed; inset: 0; background: #FBFAF9;
    flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100;
    animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* ── Sidebar ── */
  aside { position: sticky; top: 0; height: 100vh; overflow-y: auto; }

  /* ── Exercise list item ── */
  .ex-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-radius: 10px; cursor: pointer; transition: background 0.15s; }
  .ex-item.active { background: #FDF4F2; border: 1px solid #EC9679; }
  .ex-item.done { opacity: 0.5; }
  .ex-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .ex-num.active { background: #EC9679; color: white; }
  .ex-num.done { background: #5DCAA5; color: white; }
  .ex-num.pending { background: #E4E0DC; color: #888; }

  /* ── Pulsing dot ── */
  @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.7} }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #EC9679;
    animation: pulse-dot 1.2s ease-in-out infinite; display: inline-block; }

  /* Mobile nav */
  .mobile-nav { display: none; }
  @media(max-width:768px) {
    .desktop-layout { flex-direction: column; }
    .sidebar { display: none !important; }
    .mobile-nav { display: block; }
    .main-content { padding: 16px !important; }
    .gif-container { height: 260px !important; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     COMPLETED SCREEN
═══════════════════════════════════════════════════════════════ -->
<div class="completed-screen" id="completedScreen">
  <div style="font-size:64px;">🎉</div>
  <h2 style="font-size:28px;font-weight:700;color:#1D1A16">Session complete!</h2>
  <p style="font-size:16px;color:#6A5E53;text-align:center;max-width:280px" id="completedMsg">You did it. Every move counts.</p>
  <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center">
    <div style="background:#F6F5F3;border-radius:12px;padding:14px 20px;text-align:center">
      <div style="font-size:22px;font-weight:700" id="completedDuration">—</div>
      <div style="font-size:12px;color:#888;margin-top:2px">duration</div>
    </div>
    <div style="background:#F6F5F3;border-radius:12px;padding:14px 20px;text-align:center">
      <div style="font-size:22px;font-weight:700" id="completedExCount">—</div>
      <div style="font-size:12px;color:#888;margin-top:2px">exercises</div>
    </div>
    <div style="background:#F6F5F3;border-radius:12px;padding:14px 20px;text-align:center">
      <div style="font-size:22px;font-weight:700" id="completedIntensity">—</div>
      <div style="font-size:12px;color:#888;margin-top:2px">intensity</div>
    </div>
  </div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <button class="btn-primary" onclick="window.location.href='home-medium.html'">Back to home</button>
    <button class="btn-secondary" onclick="restartSession()">Repeat session</button>
  </div>
</div>

var INTENSITY_COLORS = {
  'Low':    {bg:'#DBEAFE', color:'#1D4ED8'},

var EX_DB_BASE = 'https://exercisedb.dev/api/exercises';
var EX_DB_BACKUP = 'https://exercisedb.p.rapidapi.com/exercises/exercise';

// ── State ──────────────────────────────────────────────────────
var session = null;
var currentIdx = 0;

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var sessionKey = params.get('session') || 'morning-wake-up-stretch';

  session = SESSIONS[sessionKey];
  if (!session) {
    session = SESSIONS['morning-wake-up-stretch'];
  }

  initSession();
});

function initSession() {
  // Sidebar info
  document.getElementById('sideCategory').textContent = session.category;
  document.getElementById('sideTitle').textContent = session.title;
  document.getElementById('sideDuration').textContent = session.duration + ' min';
  document.getElementById('exCategory').textContent = session.category;

  var badge = INTENSITY_COLORS[session.intensity] || INTENSITY_COLORS['Medium'];
  var badgeEl = document.getElementById('sideBadge');
  badgeEl.textContent = session.intensity;
  badgeEl.style.background = badge.bg;
  badgeEl.style.color = badge.color;

  // Build exercise list in sidebar
  buildExerciseList();

  // Build progress dots
  buildProgressDots();

  // Load first exercise
  loadExercise(0);

  // Preload GIFs for next 2 exercises
  preloadGifs();
}

function buildExerciseList() {
  var list = document.getElementById('exerciseList');
  list.innerHTML = '';
  session.exercises.forEach(function(ex, i) {
    var item = document.createElement('div');
    item.className = 'ex-item' + (i === 0 ? ' active' : '');
    item.id = 'ex-item-' + i;
    item.innerHTML =
      '<div class="ex-num ' + (i === 0 ? 'active' : 'pending') + '" id="ex-num-' + i + '">' + (i+1) + '</div>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:13px;font-weight:500;color:#1D1A16;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + ex.name + '</div>' +
        '<div style="font-size:11px;color:#888">' + formatDuration(ex.duration) + '</div>' +
      '</div>';
    item.onclick = (function(idx){ return function(){ jumpToExercise(idx); }; })(i);
    list.appendChild(item);
  });
}

function buildProgressDots() {
  var dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  session.exercises.forEach(function(ex, i) {
    var d = document.createElement('div');
    d.id = 'dot-' + i;
    d.style.cssText = 'width:8px;height:8px;border-radius:50%;background:' + (i===0?'#EC9679':'#E4E0DC') + ';transition:all 0.3s;';
    dots.appendChild(d);
  });
}

// ══════════════════════════════════════════════════════════════════
// LOAD EXERCISE
// ══════════════════════════════════════════════════════════════════
function loadExercise(idx) {
  stopTimer();
  currentIdx = idx;
  var ex = session.exercises[idx];

  // Update name & badge
  document.getElementById('exName').textContent = ex.name;
  var badge = INTENSITY_COLORS[session.intensity] || INTENSITY_COLORS['Medium'];
  var exBadge = document.getElementById('exBadge');
  exBadge.textContent = session.intensity;
  exBadge.style.background = badge.bg;
  exBadge.style.color = badge.color;

  // Timer
  timeLeft = ex.duration;
  totalTime = ex.duration;
  updateTimerDisplay();
  updateTimerRing(1);

  // Instruction
  document.getElementById('exInstruction').textContent = ex.tip || '';

  // Reps
  if (ex.reps) {
    document.getElementById('repsDisplay').style.display = 'block';
    document.getElementById('repsCount').textContent = ex.reps;
  } else {
    document.getElementById('repsDisplay').style.display = 'none';
  }

  // GIF / overlays
  document.getElementById('restOverlay').style.display = 'none';
  document.getElementById('meditationOverlay').style.display = 'none';
  document.getElementById('gifLoading').style.display = 'none';
  document.getElementById('exGif').style.display = 'none';

  if (!ex.id) {
    // Rest or meditation exercise
    var cat = session.category;
    if (cat === 'Mindful Meditation') {
      document.getElementById('meditationText').textContent = ex.tip;
      document.getElementById('meditationOverlay').style.display = 'flex';
    } else {
      // Rest period
      var nextEx = session.exercises[idx+1];
      document.getElementById('nextExName').textContent = nextEx ? nextEx.name : 'Finish';
      document.getElementById('restOverlay').style.display = 'flex';
    }
  } else {
    // Load GIF from ExerciseDB
    loadGif(ex.id, idx);
  }

  // Update sidebar list
  updateSidebarList(idx);

  // Update progress
  updateProgress(idx);

  // Button states
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnPrev').style.opacity = idx === 0 ? '0.4' : '1';
  document.getElementById('btnNext').textContent = idx === session.exercises.length - 1 ? 'Finish ✓' : 'Next →';

  // Play button
  document.getElementById('btnPlayPause').textContent = '▶ Start';
  document.getElementById('timerStatus').textContent = 'ready';
  document.getElementById('pulsingDot').style.display = 'none';
  isPlaying = false;
}

function loadGif(exerciseId, exIdx) {
  if (gifCache[exerciseId]) {
    if (currentIdx === exIdx) showGif(gifCache[exerciseId]);
    return;
  }

  document.getElementById('gifLoading').style.display = 'flex';
  document.getElementById('exGif').style.display = 'none';

  // Essayer exercisedb.dev en premier
  var url = EX_DB_BASE + '/' + exerciseId;
  
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var gifUrl = data.gifUrl || data.gifurl || data.gif || '';
      if (gifUrl && currentIdx === exIdx) {
        gifCache[exerciseId] = gifUrl;
        showGif(gifUrl);
      } else if (!gifUrl) {
        if (currentIdx === exIdx) showGifFallback(session.exercises[exIdx].name);
      }
    })
    .catch(function(err) {
      console.warn('ExerciseDB failed:', err.message);
      if (currentIdx === exIdx) showGifFallback(session.exercises[exIdx].name);
    });
}

function showGif(url) {
  var img = document.getElementById('exGif');
  var fb = document.getElementById('gifFallback');
  if (fb) fb.style.display = 'none';
  document.getElementById('gifLoading').style.display = 'none';
  img.src = url;
  img.style.display = 'block';
  img.onerror = function() {
    this.style.display = 'none';
    showGifFallback(session.exercises[currentIdx].name);
  };
}

function showGifFallback(name) {
  document.getElementById('gifLoading').style.display = 'none';
  document.getElementById('exGif').style.display = 'none';
  var container = document.querySelector('.gif-container');
  var fb = document.getElementById('gifFallback');
  if (!fb) {
    fb = document.createElement('div');
    fb.id = 'gifFallback';
    fb.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;text-align:center;';
    container.appendChild(fb);
  }
  var cat = session ? session.category : '';
  var icon = (cat.indexOf('Yoga') !== -1 || cat.indexOf('Breath') !== -1) ? '🧘' :
             cat.indexOf('Meditation') !== -1 ? '🌿' :
             (cat.indexOf('Stretching') !== -1 || cat.indexOf('Mobility') !== -1) ? '🤸' :
             (cat.indexOf('Outdoor') !== -1 || cat.indexOf('Run') !== -1) ? '🏃' :
             (cat.indexOf('HIIT') !== -1 || cat.indexOf('Cardio') !== -1) ? '⚡' : '💪';
  fb.innerHTML =
    '<div style="font-size:72px;animation:pulse-icon 1.5s ease-in-out infinite">' + icon + '</div>' +
    '<div style="font-size:17px;font-weight:600;color:#1D1A16;max-width:200px;line-height:1.3">' + name + '</div>' +
    '<div style="font-size:12px;color:#888;background:#fff;border-radius:8px;padding:6px 12px">Follow the tip below</div>';
  fb.style.display = 'flex';
}

function preloadGifs() {
  for (var i = 1; i <= 2 && i < session.exercises.length; i++) {
    var ex = session.exercises[i];
    if (ex.id && !gifCache[ex.id]) {
      fetch(EX_DB_BASE + '/' + ex.id)
        .then(function(r){ return r.json(); })
        .then(function(data){ if(data.gifUrl) gifCache[data.id] = data.gifUrl; })
        .catch(function(){});
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════════════════════════
function togglePlayPause() {
  if (isPlaying) {
    pauseTimer();
  } else {
    startTimer();
    if (!sessionStartTime) sessionStartTime = Date.now();
  }
}

function startTimer() {
  isPlaying = true;
  document.getElementById('btnPlayPause').textContent = '⏸ Pause';
  document.getElementById('timerStatus').textContent = 'active';
  document.getElementById('pulsingDot').style.display = 'inline-block';

  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimerDisplay();
    updateTimerRing(timeLeft / totalTime);

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      onExerciseComplete();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  isPlaying = false;
  document.getElementById('btnPlayPause').textContent = '▶ Resume';
  document.getElementById('timerStatus').textContent = 'paused';
  document.getElementById('pulsingDot').style.display = 'none';
}

function stopTimer() {
  clearInterval(timerInterval);
  isPlaying = false;
}

function onExerciseComplete() {
  // Mark as done in sidebar
  var numEl = document.getElementById('ex-num-' + currentIdx);
  if (numEl) { numEl.className = 'ex-num done'; numEl.innerHTML = '✓'; }

  var dotEl = document.getElementById('dot-' + currentIdx);
  if (dotEl) dotEl.style.background = '#5DCAA5';

  if (currentIdx < session.exercises.length - 1) {
    setTimeout(function() { loadExercise(currentIdx + 1); startTimer(); }, 800);
  } else {
    showCompleted();
  }
}

function updateTimerDisplay() {
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

function updateTimerRing(fraction) {
  var circumference = 351.86;
  var offset = circumference * (1 - Math.max(0, Math.min(1, fraction)));
  document.getElementById('timerRing').style.strokeDashoffset = offset;

  // Color changes
  var color = fraction > 0.5 ? '#EC9679' : fraction > 0.25 ? '#EF9F27' : '#E24B4A';
  document.getElementById('timerRing').style.stroke = color;
}

// ══════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════
function nextExercise() {
  if (currentIdx < session.exercises.length - 1) {
    loadExercise(currentIdx + 1);
  } else {
    showCompleted();
  }
}

function prevExercise() {
  if (currentIdx > 0) loadExercise(currentIdx - 1);
}

function jumpToExercise(idx) {
  loadExercise(idx);
}

// ══════════════════════════════════════════════════════════════════
// UI UPDATES
// ══════════════════════════════════════════════════════════════════
function updateSidebarList(idx) {
  session.exercises.forEach(function(ex, i) {
    var item = document.getElementById('ex-item-' + i);
    var num  = document.getElementById('ex-num-' + i);
    if (!item || !num) return;

    item.className = 'ex-item' + (i === idx ? ' active' : '') + (i < idx ? ' done' : '');
    if (i < idx) {
      num.className = 'ex-num done';
      num.innerHTML = '✓';
    } else if (i === idx) {
      num.className = 'ex-num active';
      num.textContent = i + 1;
    } else {
      num.className = 'ex-num pending';
      num.textContent = i + 1;
    }
  });
}

function updateProgress(idx) {
  var total = session.exercises.length;
  var pct = Math.round((idx / total) * 100);

  document.getElementById('sideProgress').textContent = idx + ' / ' + total;
  document.getElementById('sideProgressBar').style.width = pct + '%';
  document.getElementById('mobileProgress').textContent = (idx+1) + ' / ' + total;

  // Dots
  session.exercises.forEach(function(ex, i) {
    var d = document.getElementById('dot-' + i);
    if (!d) return;
    if (i < idx) d.style.background = '#5DCAA5';
    else if (i === idx) d.style.background = '#EC9679';
    else d.style.background = '#E4E0DC';
    d.style.width  = i === idx ? '20px' : '8px';
    d.style.borderRadius = i === idx ? '4px' : '50%';
  });
}

// ══════════════════════════════════════════════════════════════════
// COMPLETED
// ══════════════════════════════════════════════════════════════════
function showCompleted() {
  stopTimer();
  var elapsed = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 60000) : session.duration;
  document.getElementById('completedMsg').textContent =
    'You completed ' + session.title + '. Every move counts.';
  document.getElementById('completedDuration').textContent = elapsed + ' min';
  document.getElementById('completedExCount').textContent = session.exercises.length;
  document.getElementById('completedIntensity').textContent = session.intensity;

  var screen = document.getElementById('completedScreen');
  screen.style.display = 'flex';
}

function restartSession() {
  document.getElementById('completedScreen').style.display = 'none';
  sessionStartTime = null;
  gifCache = {};
  initSession();
}

// ══════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════
function formatDuration(s) {
  if (s >= 60) return Math.floor(s/60) + ' min ' + (s%60>0 ? s%60+'s' : '');
  return s + 's';
}

function confirmExit() {
  if (isPlaying || currentIdx > 0) {
    if (confirm('Exit this session? Your progress will be lost.')) {
      window.history.back();
    }
  } else {
    window.history.back();
  }
}
</script>
</body>
</html>
