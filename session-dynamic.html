<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #FBFAF9; color: #1D1A16; min-height: 100vh; overflow-x: hidden; }
.timer-ring { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: #E4E0DC; stroke-width: 6; }
.timer-ring-progress { fill: none; stroke: #EC9679; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.gif-container { background: #F6F5F3; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
.gif-container img { width: 100%; height: 100%; object-fit: contain; }
.prog-bar { height: 4px; background: #E4E0DC; border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: #EC9679; border-radius: 2px; transition: width 0.5s ease; }
.btn-primary { background: #EC9679; color: #1D1A16; font-weight: 600; font-size: 16px; padding: 14px 32px; border-radius: 50px; border: none; cursor: pointer; transition: all 0.2s; }
.btn-primary:hover { background: #d88568; transform: scale(1.02); }
.btn-secondary { background: transparent; color: #6A5E53; font-size: 14px; font-weight: 500; padding: 10px 20px; border-radius: 50px; border: 1.5px solid #E4E0DC; cursor: pointer; transition: all 0.2s; }
.btn-secondary:hover { background: #F6F5F3; }
.ex-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s; }
.ex-item.active { background: #FDF4F2; border: 1px solid #EC9679; }
.ex-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.ex-num.active-n { background: #EC9679; color: white; }
.ex-num.done-n { background: #5DCAA5; color: white; }
.ex-num.pending-n { background: #E4E0DC; color: #888; }
.completed-screen { display: none; position: fixed; inset: 0; background: #FBFAF9; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-icon { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes fadein { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #EC9679; animation: pulse-dot 1.2s ease-in-out infinite; display: inline-block; }
@keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
</style>
<script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<!-- COMPLETED SCREEN -->
<div class="completed-screen" id="completedScreen">

  <h2 style="font-size:28px;font-weight:700">Session complete!</h2>

  <div style="display:flex;gap:12px">
    <button class="btn-primary" onclick="window.location.href='home-medium.html'">Back to home</button>
    <button class="btn-secondary" onclick="restartSession()">Repeat</button>

</div>

var INT_COLORS = {
  'Low':    {bg:'#DBEAFE',color:'#1D4ED8'},
  'Medium': {bg:'#EDE9FE',color:'#5B21B6'},
  'High':   {bg:'#FEE2E2',color:'#B91C1C'}
};

// ── State ────────────────────────────────────────────────────
var session=null, curIdx=0, timerInt=null, timeLeft=0, totalTime=0, isPlaying=false, startTime=null;

// ── Init ─────────────────────────────────────────────────────
// Variable globale pour tracker la clé de session active
var currentSessionKey = '';

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('logoImg').src = LOGO_SRC;
  var params = new URLSearchParams(window.location.search);
  var key = params.get('session') || 'morning-wake-up-stretch';
  currentSessionKey = key;

  if (key === 'custom') {
    // Charger une séance custom depuis sessionStorage (créée par Bolt)
    var customRaw = null;
    try { customRaw = sessionStorage.getItem('_custom_session'); } catch(e) {}
    if (customRaw) {
      try {
        var customSession = JSON.parse(customRaw);
        // Validation : chaque exercice doit avoir un id qui existe dans la base d'exercices
        var validExercises = [];
        // Construire un index global des exercices par id
        var exerciseIndex = {};
        Object.keys(SESSIONS).forEach(function(sk) {
          (SESSIONS[sk].exercises || []).forEach(function(ex) {
            if (ex.id && !exerciseIndex[ex.id]) exerciseIndex[ex.id] = ex;
          });
        });
        (customSession.exercises || []).forEach(function(ex) {
          if (ex.id && exerciseIndex[ex.id]) {
            // Compléter avec les données de référence si manquantes
            var ref = exerciseIndex[ex.id];
            validExercises.push({
              name: ex.name || ref.name,
              id: ex.id,
              duration: ex.duration || ref.duration || 30,
              reps: ex.reps !== undefined ? ex.reps : ref.reps,
              tip: ex.tip || ref.tip || ''
            });
          }
        });
        if (validExercises.length === 0) {
          // Fallback si aucun exercice valide
          alert('La séance personnalisée contient des exercices invalides. Redirection vers une séance par défaut.');
          session = SESSIONS['morning-wake-up-stretch'];
        } else {
          session = {
            title: customSession.title || 'Custom Session',
            category: customSession.category || 'Custom',
            duration: customSession.duration || Math.ceil(validExercises.reduce(function(s,e){return s+(e.duration||30);},0) / 60),
            intensity: customSession.intensity || 'Medium',
            color: customSession.color || '#FBEAE4',
            exercises: validExercises
          };
        }
      } catch(e) {
        alert('Erreur de chargement de la séance personnalisée.');
        session = SESSIONS['morning-wake-up-stretch'];
      }
    } else {
      alert('Aucune séance personnalisée trouvée.');
      session = SESSIONS['morning-wake-up-stretch'];
    }
  } else {
    session = SESSIONS[key] || SESSIONS['morning-wake-up-stretch'];
  }
  initSession();
});

function initSession() {
  var ic = INT_COLORS[session.intensity] || INT_COLORS['Medium'];
  document.getElementById('sCat').textContent = session.category;
  document.getElementById('sTitle').textContent = session.title;
  document.getElementById('sDur').textContent = session.duration + ' min';
  document.getElementById('exCat').textContent = session.category;
  setbadge('sBadge', session.intensity, ic);
  buildList(); buildDots(); loadEx(0);
}

function setbadge(id, text, ic) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.style.background = ic.bg;
  el.style.color = ic.color;
}

function buildList() {
  var list = document.getElementById('exList');
  list.innerHTML = '';
  session.exercises.forEach(function(ex, i) {
    var d = document.createElement('div');
    d.className = 'ex-item' + (i===0?' active':'');
    d.id = 'ei'+i;
    d.innerHTML = '<div class="ex-num '+(i===0?'active-n':'pending-n')+'" id="en'+i+'">'+(i+1)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+ex.name+'</div>'
      +'<div style="font-size:10px;color:#888">'+fmt(ex.duration)+'</div></div>';
    d.onclick = (function(idx){return function(){loadEx(idx);};})(i);
    list.appendChild(d);
  });
}

function buildDots() {
  var dots = document.getElementById('dots');
  dots.innerHTML = '';
  session.exercises.forEach(function(ex,i) {
    var d = document.createElement('div');
    d.id='dot'+i;
    d.style.cssText='width:8px;height:8px;border-radius:50%;background:'+(i===0?'#EC9679':'#E4E0DC')+';transition:all 0.3s';
    dots.appendChild(d);
  });
}

function loadEx(idx) {
  stopTimer();
  curIdx = idx;
  var ex = session.exercises[idx];
  document.getElementById('exName').textContent = ex.name;
  document.getElementById('exTip').textContent = ex.tip || '';
  var ic = INT_COLORS[session.intensity] || INT_COLORS['Medium'];
  setbadge('exBadge', session.intensity, ic);

  timeLeft = ex.duration; totalTime = ex.duration;
  updateTimerDisplay(); updateRing(1);

  if (ex.reps) {
    document.getElementById('repsBox').style.display = 'block';
    document.getElementById('repsVal').textContent = ex.reps;
  } else {
    document.getElementById('repsBox').style.display = 'none';
  }

  // Reset overlays
  hide('restOverlay'); hide('meditationOverlay'); hide('gifFallback');
  // Nettoyer le player YouTube précédent
  if (ytPlayer) { try { ytPlayer.destroy(); } catch(e) {} ytPlayer = null; }
  var oldDiv = document.getElementById('yt-player-div');
  if (oldDiv) oldDiv.remove();
  var oldPh = document.getElementById('yt-placeholder');
  if (oldPh) oldPh.remove();
  document.getElementById('exGif').style.display = 'none';
  document.getElementById('gifLoading').style.display = 'flex';

  if (!ex.id) {
    document.getElementById('gifLoading').style.display = 'none';
    if (session.category === 'Mindful Meditation') {
      document.getElementById('medText').textContent = ex.tip;
      show('meditationOverlay');
    } else {
      var nxt = session.exercises[idx+1];
      document.getElementById('nextExName').textContent = nxt ? nxt.name : 'Finish!';
      show('restOverlay');
    }
  } else {
    // Afficher un placeholder "click start" au lieu de charger la vidéo
    document.getElementById('gifLoading').style.display = 'none';
    showVideoPlaceholder(ex.name, idx);
  }

  updateList(idx); updateProgress(idx);
  document.getElementById('btnPrev').style.opacity = idx===0?'0.4':'1';
  document.getElementById('btnNext').textContent = idx===session.exercises.length-1?'Finish ✓':'Next →';
  document.getElementById('btnPlay').textContent = '▶ Start';
  document.getElementById('timerStatus').textContent = 'ready';
  isPlaying = false;
}

var YT_MAP = {"Jumping Jacks": "c4DAnQ6DtF8", "Lateral Shuffle": "c4DAnQ6DtF8", "Squat Jump": "Qgpxx1Bxmgs", "Upper Body Activation": "Qgpxx1Bxmgs", "Mountain Climbers": "wrn1Cm_yfEU", "Dead Bug": "wrn1Cm_yfEU", "Burpee": "xRdGC6cFY0s", "Stability Ball Basics": "vthMCtgVtFw", "High Knees": "nGaXj3kkmrU", "Full Body Shake": "dJF1MJPmCj4", "Push Up": "IODxDxX7oi4", "Tricep Dip": "IODxDxX7oi4", "Plank Hold": "ASdvN_XEl_c", "Forearm Plank": "ASdvN_XEl_c", "Plank to Chaturanga": "Nx_-MRwRvtE", "Cool Down": "eqVMAPM00DM", "Squat": "P-yaD24bUE8", "Dumbbell Foundational": "P-yaD24bUE8", "Reverse Lunge (right)": "7AWLfjXYjTE", "Reverse Lunge (left)": "7AWLfjXYjTE", "Glute Bridge": "B7kTkXDIMuE", "Superman Hold": "B7kTkXDIMuE", "Bird Dog": "9X3OKE6xZqw", "Side Plank (right)": "WDIpL0pjun0", "Side Plank (left)": "WDIpL0pjun0", "Mountain Pose": "u_jNKRDMkrM", "Neck Side Stretch": "U20I89tTv2U", "Standing Side Stretch": "U20I89tTv2U", "Shoulder Roll": "FcttbMXJA0A", "Hip Circle": "FcttbMXJA0A", "Chest Opener": "nmgCEFBqB0I", "Face & Head Scan": "O-6f5wkWN50", "Standing Forward Fold": "tnHRoE7HJi0", "Calf Raise": "DlS-GAF8Edg", "Standing Calf Stretch": "u_jNKRDMkrM", "Low Lunge (right)": "zuYbjkuKLKY", "Low Lunge (left)": "zuYbjkuKLKY", "Pigeon Pose (right)": "V7hr4w3pd6w", "Pigeon Pose (left)": "V7hr4w3pd6w", "Supine Hip Stretch": "aihbOIot3p0", "Bridge Pose": "artJ8bH9jXs", "Child's Pose": "eqVMAPM00DM", "Cobra Pose": "J_lLt6-GlMo", "Settling Breath": "J_lLt6-GlMo", "Downward Dog": "9X3OKE6xZqw", "Three-Legged Dog": "LHC96BuPv8I", "Warrior I (right)": "Mn6RSRCV3Nw", "Warrior I (left)": "LHC96BuPv8I", "Warrior II (right)": "EniGBCHAEVQ", "Warrior II (left)": "2MJGg-dUKh0", "Sun Salutation A": "VH-Ws3K-x7k", "Legs Up the Wall": "VH-Ws3K-x7k", "Supine Twist (right)": "aihbOIot3p0", "Supine Twist (left)": "N4figcWjDGI", "Reclined Butterfly": "N4figcWjDGI", "Savasana": "1VYlOKygqM8", "Brisk Walk Warm-Up": "dJF1MJPmCj4", "Easy Jog": "vVxbFRTlGF0", "Walk Recovery": "oGEvMX1DlM0", "Cool Down Walk": "vthMCtgVtFw", "Feet & Legs Scan": "86m4RC_ADEY", "Hips & Belly Scan": "86m4RC_ADEY", "Chest & Back Scan": "inpok4MKVLM", "Arms & Hands Scan": "inpok4MKVLM", "Whole Body Awareness": "O-6f5wkWN50"};
var ytPlayer = null;
var ytReady = false;

// Callback YouTube IFrame API
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
};

function getYouTubeId(exName) {
  if (YT_MAP[exName]) return YT_MAP[exName];
  var lower = exName.toLowerCase();
  for (var key in YT_MAP) {
    if (lower.indexOf(key.toLowerCase()) !== -1) return YT_MAP[key];
  }
  var cat = session ? session.category : '';
  if (cat.indexOf('HIIT') !== -1 || cat.indexOf('Cardio') !== -1) return 'c4DAnQ6DtF8';
  if (cat.indexOf('Yoga') !== -1 || cat.indexOf('Breath') !== -1) return 'oGEvMX1DlM0';
  if (cat.indexOf('Stretch') !== -1 || cat.indexOf('Mobil') !== -1) return '7AWLfjXYjTE';
  if (cat.indexOf('Strength') !== -1) return 'P-yaD24bUE8';
  if (cat.indexOf('Outdoor') !== -1 || cat.indexOf('Run') !== -1) return 'nGaXj3kkmrU';
  return 'c4DAnQ6DtF8';
}

function showVideoPlaceholder(exName, exIdx) {
  var container = document.querySelector('.gif-container');
  var ph = document.getElementById('yt-placeholder');
  if (!ph) {
    ph = document.createElement('div');
    ph.id = 'yt-placeholder';
    ph.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;background:#F6F5F3;border-radius:20px;';
    container.appendChild(ph);
  }

  // Icône selon catégorie
  var cat = session ? session.category : '';
  var icon = cat.indexOf('Yoga')!==-1||cat.indexOf('Breath')!==-1?'🧘':
             cat.indexOf('Medit')!==-1?'🌿':
             cat.indexOf('Stretch')!==-1||cat.indexOf('Mobil')!==-1?'🤸':
             cat.indexOf('Outdoor')!==-1||cat.indexOf('Run')!==-1?'🏃':
             cat.indexOf('HIIT')!==-1||cat.indexOf('Cardio')!==-1?'⚡':'💪';

  ph.innerHTML =
    '<div style="font-size:52px">' + icon + '</div>' +
    '<div style="text-align:center;padding:0 20px;">' +
      '<div style="font-size:16px;font-weight:600;color:#1D1A16;margin-bottom:6px">' + exName + '</div>' +
      '<div style="font-size:13px;color:#6A5E53">Press <b style=color:#EC9679>Start</b> to begin</div>' +
    '</div>' +
    '<div style="width:52px;height:52px;border-radius:50%;background:#EC9679;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(236,150,121,.4);">' +
      '<span style="color:white;font-size:20px;margin-left:4px">▶</span>' +
    '</div>';
  ph.style.display = 'flex';
  ph.onclick = function() { togglePlay(); };
}

function hideVideoPlaceholder() {
  var ph = document.getElementById('yt-placeholder');
  if (ph) ph.style.display = 'none';
}

function loadGif(exId, exIdx) {
  var exName = session.exercises[exIdx].name;
  document.getElementById('gifLoading').style.display = 'none';
  document.getElementById('exGif').style.display = 'none';
  var ytId = getYouTubeId(exName);
  loadYouTubePlayer(ytId);
}

function loadYouTubePlayer(videoId) {
  var container = document.querySelector('.gif-container');

  // Supprimer l'ancien player
  if (ytPlayer) {
    try { ytPlayer.destroy(); } catch(e) {}
    ytPlayer = null;
  }
  var oldDiv = document.getElementById('yt-player-div');
  if (oldDiv) oldDiv.remove();

  document.getElementById('gifLoading').style.display = 'none';
  document.getElementById('exGif').style.display = 'none';

  // Créer un div pour le player
  var playerDiv = document.createElement('div');
  playerDiv.id = 'yt-player-div';
  playerDiv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border-radius:20px;overflow:hidden;';
  container.appendChild(playerDiv);

  if (ytReady && window.YT && window.YT.Player) {
    ytPlayer = new YT.Player('yt-player-div', {
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 1,
        rel: 0,
        modestbranding: 1,
        loop: 1,
        playlist: videoId
      },
      events: {
        onReady: function(e) { e.target.playVideo(); }
      }
    });
  } else {
    // Fallback iframe si API pas encore prête
    var iframe = document.createElement('iframe');
    iframe.id = 'yt-iframe-fallback';
    iframe.style.cssText = 'width:100%;height:100%;border:none;border-radius:20px;';
    iframe.src = 'https://www.youtube.com/embed/' + videoId
      + '?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&loop=1&playlist=' + videoId;
    iframe.allow = 'autoplay; fullscreen';
    playerDiv.appendChild(iframe);
    // Retry avec l'API après 1s
    setTimeout(function() {
      if (ytReady && window.YT && window.YT.Player) {
        var fb = document.getElementById('yt-iframe-fallback');
        if (fb) fb.remove();
        ytPlayer = new YT.Player('yt-player-div', {
          videoId: videoId,
          playerVars: { autoplay:1, mute:1, controls:1, rel:0, loop:1, playlist:videoId },
          events: { onReady: function(e){ e.target.playVideo(); } }
        });
      }
    }, 1500);
  }
}

function pauseYouTube() {
  if (ytPlayer && ytPlayer.pauseVideo) {
    try { ytPlayer.pauseVideo(); } catch(e) {}
  }
}

function resumeYouTube() {
  if (ytPlayer && ytPlayer.playVideo) {
    try { ytPlayer.playVideo(); } catch(e) {}
  }
}

function showFallback(name) {
  document.getElementById('gifLoading').style.display = 'none';
  document.getElementById('exGif').style.display = 'none';
  var cat = session ? session.category : '';
  var icon = cat.indexOf('Yoga')!==-1||cat.indexOf('Breath')!==-1?'🧘':
             cat.indexOf('Medit')!==-1?'🌿':
             cat.indexOf('Stretch')!==-1||cat.indexOf('Mobil')!==-1?'🤸':
             cat.indexOf('Outdoor')!==-1||cat.indexOf('Run')!==-1?'🏃':
             cat.indexOf('HIIT')!==-1||cat.indexOf('Cardio')!==-1?'⚡':'💪';
  document.getElementById('fallbackIcon').textContent = icon;
  document.getElementById('fallbackName').textContent = name;
  show('gifFallback');
}

function togglePlay() {
  if (isPlaying) {
    pauseTimer();
    pauseYouTube();
  } else {
    if (!startTime) startTime = Date.now();
    startTimer();
    resumeYouTube();
  }
}

function startTimer() {
  isPlaying = true;
  document.getElementById('btnPlay').textContent = '⏸ Pause';
  document.getElementById('timerStatus').textContent = 'active';

  // Charger la vidéo YouTube au premier démarrage de l'exercice
  var ex = session.exercises[curIdx];
  if (ex && ex.id) {
    hideVideoPlaceholder();
    var ytId = getYouTubeId(ex.name);
    // Charger seulement si pas déjà un player actif
    if (!ytPlayer && !document.getElementById('yt-player-div')) {
      loadYouTubePlayer(ytId);
    } else if (ytPlayer) {
      resumeYouTube();
    }
  }

  timerInt = setInterval(function() {
    timeLeft--;
    updateTimerDisplay(); updateRing(timeLeft/totalTime);
    if (timeLeft <= 0) { clearInterval(timerInt); onDone(); }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInt); isPlaying=false;
  document.getElementById('btnPlay').textContent = '▶ Resume';
  document.getElementById('timerStatus').textContent = 'paused';
}

function stopTimer() { clearInterval(timerInt); isPlaying=false; }

function onDone() {
  var num = document.getElementById('en'+curIdx);
  if (num) { num.className='ex-num done-n'; num.textContent='✓'; }
  var dot = document.getElementById('dot'+curIdx);
  if (dot) dot.style.background='#5DCAA5';
  if (curIdx < session.exercises.length-1) {
    setTimeout(function(){ loadEx(curIdx+1); startTimer(); }, 600);
  } else { showCompleted(); }
}

function nextEx() {
  if (curIdx < session.exercises.length-1) loadEx(curIdx+1);
  else showCompleted();
}
function prevEx() { if (curIdx>0) loadEx(curIdx-1); }

function updateList(idx) {
  session.exercises.forEach(function(ex,i) {
    var item=document.getElementById('ei'+i), num=document.getElementById('en'+i);
    if(!item||!num) return;
    item.className='ex-item'+(i===idx?' active':'');
    if (i<idx){ num.className='ex-num done-n'; num.textContent='✓'; }
    else if(i===idx){ num.className='ex-num active-n'; num.textContent=i+1; }
    else{ num.className='ex-num pending-n'; num.textContent=i+1; }
  });
}

function updateProgress(idx) {
  var total=session.exercises.length, pct=Math.round(idx/total*100);
  document.getElementById('sProgress').textContent=idx+' / '+total;
  document.getElementById('mProg').textContent=(idx+1)+' / '+total;
  document.getElementById('sProgBar').style.width=pct+'%';
  session.exercises.forEach(function(ex,i){
    var d=document.getElementById('dot'+i);
    if(!d) return;
    d.style.background=i<idx?'#5DCAA5':i===idx?'#EC9679':'#E4E0DC';
    d.style.width=i===idx?'18px':'8px';
    d.style.borderRadius=i===idx?'4px':'50%';
  });
}

function updateTimerDisplay() {
  var m=Math.floor(timeLeft/60), s=timeLeft%60;
  document.getElementById('timerDisplay').textContent=m+':'+(s<10?'0':'')+s;
}

function updateRing(frac) {
  var c=326.73, off=c*(1-Math.max(0,Math.min(1,frac)));
  document.getElementById('timerRing').style.strokeDashoffset=off;
  document.getElementById('timerRing').style.stroke=frac>0.5?'#EC9679':frac>0.25?'#EF9F27':'#E24B4A';
}

function showCompleted() {
  stopTimer();
  pauseYouTube();
  var elapsed = startTime ? Math.round((Date.now() - startTime) / 60000) : session.duration;
  if (elapsed < 1) elapsed = 1;

  // === Tracking de la session terminée ===
  try {
    // Calcul calories : ~5 cal/min Low, ~8 Mid, ~11 High
    var ratePerMin = 5;
    var intensityKey = (session.intensity || '').toLowerCase();
    if (intensityKey.indexOf('high') !== -1) ratePerMin = 11;
    else if (intensityKey.indexOf('med') !== -1) ratePerMin = 8;
    var calories = Math.round(elapsed * ratePerMin);

    var sessionRecord = {
      key: (typeof currentSessionKey !== 'undefined' ? currentSessionKey : '') || (new URLSearchParams(window.location.search)).get('session') || 'custom',
      title: session.title,
      duration: elapsed,
      calories: calories,
      intensity: session.intensity || 'Low',
      category: session.category || '',
      timestamp: Date.now()
    };

    // sessionStorage : sessions de la session d'utilisation actuelle (pour summary)
    var todayList = [];
    try { todayList = JSON.parse(sessionStorage.getItem('_sessions_today') || '[]'); } catch(e) {}
    todayList.push(sessionRecord);
    try { sessionStorage.setItem('_sessions_today', JSON.stringify(todayList)); } catch(e) {}

    // localStorage : historique long terme (pour achievements + Bolt context)
    var history = [];
    try { history = JSON.parse(localStorage.getItem('_sessions_history') || '[]'); } catch(e) {}
    history.push(sessionRecord);
    // Garder max 200 sessions
    if (history.length > 200) history = history.slice(-200);
    try { localStorage.setItem('_sessions_history', JSON.stringify(history)); } catch(e) {}

    // Mise à jour automatique des achievements
    try { _updateAchievements(sessionRecord); } catch(e) { console.warn('Achievement update error:', e); }
  } catch(e) { console.warn('Session tracking error:', e); }

  var params = '?duration=' + elapsed + '&name=' + encodeURIComponent(session.title);
  window.location.href = 'celebration.html' + params;
}

// === Tracking automatique des achievements ===
function _updateAchievements(sessionRecord) {
  var achievements = [];
  try { achievements = JSON.parse(localStorage.getItem('_achievements') || '[]'); } catch(e) { return; }
  if (!achievements.length) return;

  var now = Date.now();
  var changed = false;

  achievements.forEach(function(a) {
    if (a.completed) return;
    if (a.endDate && now > a.endDate) return; // expiré

    // Type 'sessions' : compter le nombre de sessions
    if (a.type === 'sessions' || a.type === 'comeback') {
      a.current = (a.current || 0) + 1;
      changed = true;
    }
    // Type 'minutes' : ajouter durée
    else if (a.type === 'minutes') {
      a.current = (a.current || 0) + sessionRecord.duration;
      changed = true;
    }
    // Type 'streak' : incrémenter si nouvelle journée
    else if (a.type === 'streak') {
      var lastDay = a.lastDay || 0;
      var today = new Date(); today.setHours(0,0,0,0);
      var todayTs = today.getTime();
      if (todayTs > lastDay) {
        // Si gap > 1 jour, reset à 1 ; sinon +1
        var dayMs = 86400000;
        if (lastDay && (todayTs - lastDay) > dayMs * 1.5) a.current = 1;
        else a.current = (a.current || 0) + 1;
        a.lastDay = todayTs;
        changed = true;
      }
    }
    // Type 'category' : compter sessions de cette catégorie
    else if (a.type === 'category') {
      if (sessionRecord.category && a.categoryFilter && 
          sessionRecord.category.toLowerCase().indexOf(a.categoryFilter.toLowerCase()) !== -1) {
        a.current = (a.current || 0) + 1;
        changed = true;
      }
    }
    // Type 'distance' : pour les courses (approx 1km / 6 min de course)
    else if (a.type === 'distance') {
      if (sessionRecord.category && sessionRecord.category.toLowerCase().indexOf('cardio') !== -1
          || sessionRecord.title && sessionRecord.title.toLowerCase().indexOf('run') !== -1
          || sessionRecord.title && sessionRecord.title.toLowerCase().indexOf('jog') !== -1) {
        var km = Math.round((sessionRecord.duration / 6) * 10) / 10;
        a.current = Math.round((a.current || 0) * 10 + km * 10) / 10;
        changed = true;
      }
    }

    // Vérifier complétion
    if (!a.completed && a.current >= a.target) {
      a.completed = true;
      a.completedAt = now;
      // Marquer pour célébration sur celebration.html
      try {
        var celebrate = JSON.parse(sessionStorage.getItem('_pending_celebration') || '[]');
        celebrate.push({ name: a.name, type: a.type, target: a.target });
        sessionStorage.setItem('_pending_celebration', JSON.stringify(celebrate));
      } catch(e) {}
    }
  });

  if (changed) {
    try { localStorage.setItem('_achievements', JSON.stringify(achievements)); } catch(e) {}
  }
}

function restartSession() {
  document.getElementById('completedScreen').style.display='none';
  startTime=null; curIdx=0; initSession();
}

function fmt(s) { return s>=60?Math.floor(s/60)+'min'+(s%60>0?' '+s%60+'s':''):s+'s'; }
function show(id) { var el=document.getElementById(id); if(el){ el.style.display='flex'; } }
function hide(id) { var el=document.getElementById(id); if(el){ el.style.display='none'; } }
function confirmExit() {
  if(isPlaying||curIdx>0){ if(confirm('Exit session?')) window.history.back(); }
  else window.history.back();
}
