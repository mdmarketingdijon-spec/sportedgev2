<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gentle Flow - Standing Side Stretch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1D1A16;
      background-color: #FBFAF9;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .timer-display {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.05em;
    }

    .text-label {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      font-size: 0.75rem;
      color: #6A5E53;
    }

    .glass-effect {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .soft-shadow {
      box-shadow: 0 10px 25px -5px rgba(234, 144, 108, 0.15), 0 8px 10px -6px rgba(234, 144, 108, 0.1);
    }

    * {
      transition: all 0.2s ease;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .bg-gradient-bottom {
      background: linear-gradient(0deg, #FBFAF9 0%, #FBFAF9 50%, rgba(251, 250, 249, 0) 100%);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#EC9679',
            secondary: '#67E4BB',
            neutral: {
              50: '#FBFAF9',
              400: '#6A5E53',
              900: '#1D1A16',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center overflow-x-hidden">

  <!-- Background Decorative Elements -->
  <div class="fixed top-[-80px] right-[-40px] w-64 h-64 bg-primary/5 rounded-full blur-[64px] pointer-events-none"></div>
  <div class="fixed bottom-[20%] left-[-80px] w-48 h-48 bg-secondary/5 rounded-full blur-[64px] pointer-events-none"></div>

  <!-- Main Container -->
  <main class="relative w-full max-w-5xl mx-auto min-h-screen flex flex-col lg:flex-row lg:items-center lg:justify-between px-6 py-8 lg:gap-12">
    
    <!-- Left Side: Exercise Info (Desktop Layout) -->
    <div class="flex-1 flex flex-col items-center lg:items-start text-center lg:text-left z-10">
      <!-- Status Bar (Mobile Only) -->
      <div class="w-full flex justify-between items-center mb-8 lg:hidden">
        <img src="./assets-session-medium/IMG_1.svg" alt="Time" class="h-10">
        <img src="./assets-session-medium/IMG_2.svg" alt="Status Icons" class="h-10">
      </div>

      <!-- Tag -->
      <div class="inline-flex items-center px-3 py-1 bg-[#F2FDF9] rounded-full mb-4">
        <span class="text-[12px] font-semibold text-secondary uppercase tracking-wider">Gentle Flow</span>
      </div>

      <!-- Title & Subtitle -->
      <h1 class="text-2xl md:text-4xl lg:text-5xl text-neutral-900 mb-2">Standing Side Stretch</h1>
      <p class="text-sm md:text-base text-neutral-400 mb-10 lg:mb-12">Focus on your breathing</p>

      <!-- Exercise Illustration -->
      <div class="relative w-[280px] h-[280px] md:w-[340px] md:h-[340px] lg:w-[400px] lg:h-[400px] mb-12 lg:mb-0">
        <div class="absolute inset-0 bg-[#FBEAE4] rounded-full border-[4px] border-primary/10 shadow-sm"></div>
        <div class="absolute inset-0 flex items-center justify-center p-8">
          <img src="./assets-session-medium/IMG_3.webp" alt="Standing Side Stretch Illustration" class="w-full h-full object-contain">
        </div>
      </div>
    </div>

    <!-- Right Side: Timer & Controls -->
    <div class="flex-1 w-full max-w-md mx-auto lg:mx-0 flex flex-col items-center z-10">
      
      <!-- Timer Section -->
      <div class="text-center mb-12 lg:mb-16">
        <span class="text-label block mb-2">Remaining</span>
        <span class="timer-display text-[72px] md:text-[96px] leading-none font-bold text-primary">08:42</span>
      </div>

      <!-- Progress Section -->
      <div class="w-full mb-12">
        <div class="flex justify-between items-center mb-3">
          <span class="text-label">Session Progress</span>
          <span class="text-xs font-bold text-secondary">65%</span>
        </div>
        <div class="w-full h-2 bg-primary/10 rounded-full overflow-hidden">
          <div class="h-full bg-primary rounded-full" style="width: 65%"></div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="w-full space-y-4">
        <button class="w-full h-14 bg-primary hover:bg-primary/90 text-neutral-900 font-semibold text-lg rounded-full flex items-center justify-center gap-2 soft-shadow transition-transform active:scale-[0.98]">
          <img src="./assets-session-medium/IMG_4.svg" alt="Check" class="w-5 h-5">
          <span>Done</span>
        </button>
        
        <button class="w-full h-10 flex items-center justify-center gap-2 text-neutral-400 hover:text-neutral-900 font-medium text-sm transition-colors">
          <img src="./assets-session-medium/IMG_5.svg" alt="Skip" class="w-4 h-4">
          <span>Skip this exercise</span>
        </button>
      </div>

      <!-- Desktop Metadata (Visible only on large screens) -->
      <div class="hidden lg:grid grid-cols-2 gap-4 w-full mt-12 pt-8 border-t border-neutral-400/10">
        <div class="bg-white/50 p-4 rounded-2xl">
          <span class="text-label block mb-1">Calories</span>
          <span class="text-xl font-semibold">124 kcal</span>
        </div>
        <div class="bg-white/50 p-4 rounded-2xl">
          <span class="text-label block mb-1">Heart Rate</span>
          <span class="text-xl font-semibold">98 bpm</span>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom Navigation (Mobile Only) -->
  <nav class="fixed bottom-0 left-0 right-0 h-16 bg-gradient-bottom lg:hidden pointer-events-none"></nav>




<script>
/* SportEdge Navigation v2 — session-medium.html */
(function() {
  var PAGE = 'session-medium.html';
  var IS_OUTDOOR = false;

  /* ── 1. BOTTOM NAV ── */
  var NAV_MAP = {
    'home':       'home-medium.html',
    'move':       'home-medium.html',
    'progress':   'progress.html',
    'activities': 'activities.html',
    'profile':    'profile.html',
    'bolt':       'bolt.html'
  };

  document.querySelectorAll('nav a, nav button').forEach(function(el) {
    var txt = el.innerText.trim().toLowerCase();
    var alt = (el.querySelector('img') || {}).alt || '';
    alt = alt.toLowerCase();
    Object.keys(NAV_MAP).forEach(function(k) {
      if (txt.indexOf(k) !== -1 || alt.indexOf(k) !== -1) {
        el.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = NAV_MAP[k];
        });
      }
    });
  });

  /* ── 2. DELEGATION GLOBALE sur tout le document ── */
  document.addEventListener('click', function(e) {
    var el = e.target;
    // Remonter jusqu'à 5 niveaux pour trouver le conteneur cliquable
    for (var i = 0; i < 5; i++) {
      if (!el || el === document.body) break;
      var txt = (el.innerText || '').trim().toLowerCase();

      /* CTA principaux */
      if (/(start now|let.s go|start session|begin|commencer)/.test(txt)) {
        e.preventDefault();
        if (PAGE === 'onboarding.html') {
          var energy = window._sportedgeEnergy || 'medium';
          var loc    = window._sportedgeLocation || 'indoor';
          if (loc === 'outdoor') {
            window.location.href = 'home-' + energy + '-outdoor.html';
          } else {
            window.location.href = 'home-' + energy + '.html';
          }
        } else {
          window.location.href = 'home-medium.html';
        }
        return;
      }

      /* Post-session / Done */
      if (/(done|finish|complete|great job|i did it|well done)/.test(txt) && txt.length < 40) {
        e.preventDefault(); window.location.href = 'celebration.html'; return;
      }

      /* Back to home / Return */
      if (/(back to home|go home|return home)/.test(txt)) {
        e.preventDefault(); window.location.href = 'home-medium.html'; return;
      }

      /* Save / Confirm overlays */
      if (/^save/.test(txt) || txt === 'save preferences' || txt === 'confirm') {
        e.preventDefault(); window.location.href = 'profile.html'; return;
      }

      /* Activities → Libraries */
      if (PAGE.indexOf('activities') !== -1 || PAGE.indexOf('od-activities') !== -1) {
        var libMap = {
          'stretching': 'library-stretching.html',
          'hiit':       'library-hiit.html',
          'cardio':     'library-hiit.html',
          'yoga':       'library-yoga.html',
          'breathwork': 'library-yoga.html',
          'outdoor run':'library-outdoor-runs.html',
          'strength':   'library-strength.html',
          'meditation': 'library-meditation.html',
          'mindful':    'library-meditation.html'
        };
        Object.keys(libMap).forEach(function(k) {
          if (txt.indexOf(k) !== -1) {
            e.preventDefault(); window.location.href = libMap[k]; return;
          }
        });
      }

      /* Profile → overlays */
      if (PAGE.indexOf('profile') !== -1) {
        if (txt.indexOf('notification') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
        if (txt.indexOf('energy') !== -1) {
          e.preventDefault(); window.location.href = 'energy.html'; return;
        }
        if (txt.indexOf('about') !== -1) {
          e.preventDefault(); window.location.href = 'about.html'; return;
        }
        if (txt.indexOf('training type') !== -1 || txt.indexOf('preferred') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
      }

      /* Library / Overlay → retour */
      if (/(library|session|celebration|notification|energy|about|notification)/.test(PAGE)) {
        var isBackEl = (txt === '' || txt === '←' || txt === '‹' || txt === 'back') &&
                       (el.tagName === 'BUTTON' || el.tagName === 'A');
        var hasBackImg = el.querySelector && el.querySelector('img[alt*="back"], img[alt*="Back"], img[alt*="arrow"], img[alt*="Arrow"]');
        if (isBackEl || hasBackImg) {
          e.preventDefault(); window.history.back(); return;
        }
      }

      el = el.parentElement;
    }
  });

  /* ── 3. ONBOARDING : sélection énergie + lieu ── */
  if (PAGE === 'onboarding.html') {
    window._sportedgeEnergy   = 'medium';
    window._sportedgeLocation = 'indoor';

    document.querySelectorAll('button, [class*="rounded"]').forEach(function(btn) {
      var txt = (btn.innerText || '').trim().toLowerCase();
      if (txt.indexOf('low') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'low';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('high') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'high';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('medium') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'medium';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('trainer') !== -1 || txt.indexOf('outdoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'outdoor';
          highlightSel(btn, 'location');
        });
      } else if (txt.indexOf('mat') !== -1 || txt.indexOf('indoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'indoor';
          highlightSel(btn, 'location');
        });
      }
    });

    /* CTA footer onboarding */
    var footerBtn = document.querySelector('footer button');
    if (footerBtn) {
      footerBtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var e2 = window._sportedgeEnergy;
        var l  = window._sportedgeLocation;
        window.location.href = (l === 'outdoor')
          ? 'home-' + e2 + '-outdoor.html'
          : 'home-' + e2 + '.html';
      });
    }
  }

  function highlightSel(el, group) {
    var sel = '[data-group="' + group + '"]';
    document.querySelectorAll(sel).forEach(function(b) {
      b.style.borderColor = 'transparent';
      b.style.backgroundColor = '#F6F5F3';
    });
    el.dataset.group = group;
    el.style.borderColor = '#EC9679';
    el.style.backgroundColor = '#FDF4F2';
  }

})();
</script>

</body>
</html>
