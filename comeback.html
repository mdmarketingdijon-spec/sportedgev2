<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gentle Wake-up - Welcome Back</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1D1A16;
      background-color: #FDF4F2;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .text-balance {
      text-wrap: balance;
    }

    .soft-shadow {
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
    }

    input:focus, button:focus-visible {
      outline: 2px solid #EC9679;
      outline-offset: 2px;
    }

    @supports (-webkit-touch-callout: none) {
      .min-h-screen {
        min-height: -webkit-fill-available;
      }
    }

    /* Background decorative blobs */
    .blob-top {
      position: fixed;
      top: -100px;
      right: -50px;
      width: 300px;
      height: 300px;
      background: rgba(236, 150, 121, 0.15);
      filter: blur(64px);
      border-radius: 9999px;
      z-index: -1;
    }

    .blob-bottom {
      position: fixed;
      bottom: -100px;
      left: -50px;
      width: 320px;
      height: 320px;
      background: rgba(103, 228, 187, 0.15);
      filter: blur(64px);
      border-radius: 9999px;
      z-index: -1;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">
  <div class="blob-top"></div>
  <div class="blob-bottom"></div>

  <!-- Main Container -->
  <main class="w-full max-w-md lg:max-w-4xl px-5 py-8 flex flex-col gap-8 lg:gap-12">
    
    <!-- Status Bar (Mobile Only) -->
    <header class="flex justify-between items-center w-full lg:hidden">
      <img src="./assets-comeback/IMG_1.svg" alt="Time" class="h-10">
      <img src="./assets-comeback/IMG_2.svg" alt="Status Icons" class="h-10">
    </header>

    <!-- App Logo & Welcome -->
    <section class="flex flex-col items-center text-center gap-4 lg:mt-12">
      <div class="w-[88px] h-[88px] bg-white rounded-[26px] shadow-sm flex items-center justify-center overflow-hidden">
        <img src="./assets-comeback/IMG_3.webp" alt="App Logo" class="w-[72px] h-[72px] object-contain">
      </div>
      <div class="space-y-2">
        <h1 class="text-[30px] lg:text-[42px] leading-tight text-[#1D1A16]">Welcome back.</h1>
        <p class="text-[#6A5E53] text-[18px] lg:text-[20px] max-w-[280px] lg:max-w-md mx-auto text-balance">
          No pressure, let's start easy today.
        </p>
      </div>
    </section>

    <!-- Content Grid (Responsive) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 items-stretch">
      
      <!-- Main Card: Gentle Wake-up -->
      <article class="bg-white rounded-[32px] p-6 shadow-md flex flex-col justify-between relative overflow-hidden">
        <div class="flex justify-between items-start mb-4">
          <div class="bg-[#67E4BB]/10 px-3 py-1 rounded-full">
            <span class="text-[12px] font-semibold text-[#67E4BB] uppercase tracking-wider">Quick Start</span>
          </div>
          <div class="w-12 h-12 bg-[#FDF4F2] rounded-2xl flex items-center justify-center">
            <img src="./assets-comeback/IMG_4.svg" alt="Sun Icon" class="w-6 h-6">
          </div>
        </div>

        <div class="mb-8">
          <h2 class="text-[20px] lg:text-[24px] font-semibold mb-3">Gentle Wake-up</h2>
          <p class="text-[#6A5E53] text-[14px] lg:text-[16px] leading-relaxed">
            A tiny sequence of soft stretches to get your blood flowing. Just enough to feel the difference.
          </p>
        </div>

        <div class="pt-4 border-t border-[#E4E0DC]/50 flex items-center gap-6">
          <div class="flex items-center gap-2">
            <img src="./assets-comeback/IMG_5.svg" alt="Clock" class="w-4 h-4">
            <span class="text-[14px] font-medium">5 minutes</span>
          </div>
          <div class="flex items-center gap-2">
            <img src="./assets-comeback/IMG_6.svg" alt="Sparkles" class="w-4 h-4">
            <span class="text-[14px] font-medium">Low Intensity</span>
          </div>
        </div>
      </article>

      <!-- Image Card: Today's Focus -->
      <article class="relative rounded-[40px] overflow-hidden shadow-md aspect-[335/189] lg:aspect-auto">
        <img src="./assets-comeback/IMG_7.webp" alt="Stretching Exercise" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/10"></div>
        <div class="absolute bottom-4 left-4">
          <div class="bg-black/20 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/10">
            <span class="text-white/90 text-[12px] font-medium">Today's focus: Consistency</span>
          </div>
        </div>
      </article>

    </div>

    <!-- Actions -->
    <footer class="flex flex-col items-center gap-4 mt-4 lg:mt-8 mb-12">
      <button class="w-full max-w-[335px] lg:max-w-md h-16 bg-[#EC9679] hover:bg-[#e08565] transition-colors rounded-full shadow-md flex items-center justify-center text-[18px] font-semibold text-[#1D1A16]">
        Start 5-min
      </button>
      <button class="text-[#6A5E53] text-[14px] font-medium hover:text-[#1D1A16] transition-colors py-2">
        Not today
      </button>
    </footer>

  </main>

  <!-- Desktop Sidebar (Creative Expansion) -->
  <aside class="hidden xl:flex fixed left-0 top-0 h-full w-20 bg-white/50 backdrop-blur-md border-r border-white/30 flex-col items-center py-8 gap-8">
    <div class="w-10 h-10 bg-[#EC9679]/20 rounded-xl flex items-center justify-center text-[#EC9679]">
      <iconify-icon icon="ph:house-fill" width="24"></iconify-icon>
    </div>
    <div class="w-10 h-10 text-[#6A5E53]/50 hover:text-[#EC9679] transition-colors cursor-pointer flex items-center justify-center">
      <iconify-icon icon="ph:calendar-blank" width="24"></iconify-icon>
    </div>
    <div class="w-10 h-10 text-[#6A5E53]/50 hover:text-[#EC9679] transition-colors cursor-pointer flex items-center justify-center">
      <iconify-icon icon="ph:chart-bar" width="24"></iconify-icon>
    </div>
    <div class="mt-auto w-10 h-10 text-[#6A5E53]/50 hover:text-[#EC9679] transition-colors cursor-pointer flex items-center justify-center">
      <iconify-icon icon="ph:gear" width="24"></iconify-icon>
    </div>
  </aside>




<script>
/* SportEdge Navigation v2 — comeback.html */
(function() {
  var PAGE = 'comeback.html';
  var IS_OUTDOOR = false;

  /* ── 1. BOTTOM NAV ── */
  var NAV_MAP = {
    'home':       'home-medium.html',
    'move':       'home-medium.html',
    'progress':   'progress.html',
    'activities': 'activities.html',
    'profile':    'profile.html',
    'bolt':       'bolt.html'
  };

  document.querySelectorAll('nav a, nav button').forEach(function(el) {
    var txt = el.innerText.trim().toLowerCase();
    var alt = (el.querySelector('img') || {}).alt || '';
    alt = alt.toLowerCase();
    Object.keys(NAV_MAP).forEach(function(k) {
      if (txt.indexOf(k) !== -1 || alt.indexOf(k) !== -1) {
        el.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = NAV_MAP[k];
        });
      }
    });
  });

  /* ── 2. DELEGATION GLOBALE sur tout le document ── */
  document.addEventListener('click', function(e) {
    var el = e.target;
    // Remonter jusqu'à 5 niveaux pour trouver le conteneur cliquable
    for (var i = 0; i < 5; i++) {
      if (!el || el === document.body) break;
      var txt = (el.innerText || '').trim().toLowerCase();

      /* CTA principaux */
      if (/(start now|let.s go|start session|begin|commencer)/.test(txt)) {
        e.preventDefault();
        if (PAGE === 'onboarding.html') {
          var energy = window._sportedgeEnergy || 'medium';
          var loc    = window._sportedgeLocation || 'indoor';
          if (loc === 'outdoor') {
            window.location.href = 'home-' + energy + '-outdoor.html';
          } else {
            window.location.href = 'home-' + energy + '.html';
          }
        } else {
          window.location.href = 'home-medium.html';
        }
        return;
      }

      /* Post-session / Done */
      if (/(done|finish|complete|great job|i did it|well done)/.test(txt) && txt.length < 40) {
        e.preventDefault(); window.location.href = 'celebration.html'; return;
      }

      /* Back to home / Return */
      if (/(back to home|go home|return home)/.test(txt)) {
        e.preventDefault(); window.location.href = 'home-medium.html'; return;
      }

      /* Save / Confirm overlays */
      if (/^save/.test(txt) || txt === 'save preferences' || txt === 'confirm') {
        e.preventDefault(); window.location.href = 'profile.html'; return;
      }

      /* Activities → Libraries */
      if (PAGE.indexOf('activities') !== -1 || PAGE.indexOf('od-activities') !== -1) {
        var libMap = {
          'stretching': 'library-stretching.html',
          'hiit':       'library-hiit.html',
          'cardio':     'library-hiit.html',
          'yoga':       'library-yoga.html',
          'breathwork': 'library-yoga.html',
          'outdoor run':'library-outdoor-runs.html',
          'strength':   'library-strength.html',
          'meditation': 'library-meditation.html',
          'mindful':    'library-meditation.html'
        };
        Object.keys(libMap).forEach(function(k) {
          if (txt.indexOf(k) !== -1) {
            e.preventDefault(); window.location.href = libMap[k]; return;
          }
        });
      }

      /* Profile → overlays */
      if (PAGE.indexOf('profile') !== -1) {
        if (txt.indexOf('notification') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
        if (txt.indexOf('energy') !== -1) {
          e.preventDefault(); window.location.href = 'energy.html'; return;
        }
        if (txt.indexOf('about') !== -1) {
          e.preventDefault(); window.location.href = 'about.html'; return;
        }
        if (txt.indexOf('training type') !== -1 || txt.indexOf('preferred') !== -1) {
          e.preventDefault(); window.location.href = 'notifications.html'; return;
        }
      }

      /* Library / Overlay → retour */
      if (/(library|session|celebration|notification|energy|about|notification)/.test(PAGE)) {
        var isBackEl = (txt === '' || txt === '←' || txt === '‹' || txt === 'back') &&
                       (el.tagName === 'BUTTON' || el.tagName === 'A');
        var hasBackImg = el.querySelector && el.querySelector('img[alt*="back"], img[alt*="Back"], img[alt*="arrow"], img[alt*="Arrow"]');
        if (isBackEl || hasBackImg) {
          e.preventDefault(); window.history.back(); return;
        }
      }

      el = el.parentElement;
    }
  });

  /* ── 3. ONBOARDING : sélection énergie + lieu ── */
  if (PAGE === 'onboarding.html') {
    window._sportedgeEnergy   = 'medium';
    window._sportedgeLocation = 'indoor';

    document.querySelectorAll('button, [class*="rounded"]').forEach(function(btn) {
      var txt = (btn.innerText || '').trim().toLowerCase();
      if (txt.indexOf('low') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'low';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('high') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'high';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('medium') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'medium';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('trainer') !== -1 || txt.indexOf('outdoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'outdoor';
          highlightSel(btn, 'location');
        });
      } else if (txt.indexOf('mat') !== -1 || txt.indexOf('indoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'indoor';
          highlightSel(btn, 'location');
        });
      }
    });

    /* CTA footer onboarding */
    var footerBtn = document.querySelector('footer button');
    if (footerBtn) {
      footerBtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var e2 = window._sportedgeEnergy;
        var l  = window._sportedgeLocation;
        window.location.href = (l === 'outdoor')
          ? 'home-' + e2 + '-outdoor.html'
          : 'home-' + e2 + '.html';
      });
    }
  }

  function highlightSel(el, group) {
    var sel = '[data-group="' + group + '"]';
    document.querySelectorAll(sel).forEach(function(b) {
      b.style.borderColor = 'transparent';
      b.style.backgroundColor = '#F6F5F3';
    });
    el.dataset.group = group;
    el.style.borderColor = '#EC9679';
    el.style.backgroundColor = '#FDF4F2';
  }

})();
</script>

</body>
</html>
