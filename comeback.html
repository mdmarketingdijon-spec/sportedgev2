    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1D1A16;
      background-color: #FDF4F2;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .text-balance {
      text-wrap: balance;
    }

    .soft-shadow {
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
    }

    input:focus, button:focus-visible {
      outline: 2px solid #EC9679;
      outline-offset: 2px;
    }

    @supports (-webkit-touch-callout: none) {
      .min-h-screen {
        min-height: -webkit-fill-available;
      }
    }

    /* Background decorative blobs */
    .blob-top {
      position: fixed;
      top: -100px;
      right: -50px;
      width: 300px;
      height: 300px;
      background: rgba(236, 150, 121, 0.15);
      filter: blur(64px);
      border-radius: 9999px;
      z-index: -1;
    }

    .blob-bottom {
      position: fixed;
      bottom: -100px;
      left: -50px;
      width: 320px;
      height: 320px;
      background: rgba(103, 228, 187, 0.15);
      filter: blur(64px);
      border-radius: 9999px;
      z-index: -1;
    }
  </style>

<script>
// SE-NAV-comeback
(function(){
  'use strict';

  /* ── BARRE DE NAVIGATION DU BAS ── */
  var NAV = {
    'home':       'home-medium.html',
    'progress':   'progress.html',
    'activities': 'activities.html',
    'profile':    'profile.html',
    'bolt':       'bolt.html'
  };
  document.querySelectorAll('nav a, nav button').forEach(function(el){
    var txt = (el.innerText||'').trim().toLowerCase();
    var alt = ((el.querySelector('img')||{}).alt||'').toLowerCase();
    Object.keys(NAV).forEach(function(k){
      if(txt===k || alt===k || txt.includes(k)){
        el.href = 'javascript:void(0)';
        el.addEventListener('click',function(e){
          e.preventDefault(); e.stopImmediatePropagation();
          window.location.href = NAV[k];
        },true);
      }
    });
  });

  /* ── ONBOARDING : sélection + routing ── */
  if('comeback' === 'onboarding' || 'comeback' === 'index'){
    var _energy   = 'medium';
    var _location = 'indoor';

    var ROUTES = {
      'low-indoor':     'home-low.html',
      'low-outdoor':    'home-low-outdoor.html',
      'medium-indoor':  'home-medium.html',
      'medium-outdoor': 'home-medium-outdoor.html',
      'high-indoor':    'home-high.html',
      'high-outdoor':   'home-high-outdoor.html'
    };

    /* Sélection énergie */
    document.querySelectorAll('button').forEach(function(btn){
      var txt = (btn.innerText||'').trim().toLowerCase();
      if(txt.includes('low') && txt.length < 25){
        btn.addEventListener('click',function(){
          _energy='low';
          highlight(btn,'energy');
        });
      } else if(txt.includes('high') && txt.length < 25){
        btn.addEventListener('click',function(){
          _energy='high';
          highlight(btn,'energy');
        });
      } else if(txt.includes('medium') && txt.length < 25){
        btn.addEventListener('click',function(){
          _energy='medium';
          highlight(btn,'energy');
        });
      }
    });

    /* Sélection lieu */
    document.querySelectorAll('button').forEach(function(btn){
      var txt = (btn.innerText||'').trim().toLowerCase();
      if(txt.includes('trainer') || txt.includes('outdoor')){
        btn.addEventListener('click',function(){
          _location='outdoor';
          highlight(btn,'location');
        });
      } else if(txt.includes('mat') || txt.includes('fitness mat')){
        btn.addEventListener('click',function(){
          _location='indoor';
          highlight(btn,'location');
        });
      }
    });

    /* CTA "Start now" */
    document.querySelectorAll('button, a').forEach(function(btn){
      var txt = (btn.innerText||'').trim().toLowerCase();
      if(txt.includes('start now') || txt.includes('no commitment')){
        btn.addEventListener('click',function(e){
          e.preventDefault(); e.stopImmediatePropagation();
          var key = _energy + '-' + _location;
          window.location.href = ROUTES[key] || 'home-medium.html';
        },true);
      }
    });

    function highlight(el, group){
      document.querySelectorAll('button[data-se-group="'+group+'"]').forEach(function(b){
        b.style.border='2px solid transparent';
        b.style.backgroundColor='#F6F5F3';
        delete b.dataset.seGroup;
      });
      el.dataset.seGroup = group;
      el.style.border='2px solid #EC9679';
      el.style.backgroundColor='#FDF4F2';
    }
  }

  /* ── HOME : bouton Start session ── */
  if('comeback'.includes('home-')){
    document.querySelectorAll('button, a').forEach(function(btn){
      var txt = (btn.innerText||'').trim().toLowerCase();
      if(txt.includes('start session') || txt.includes("let's go") || txt.includes('start now')){
        btn.addEventListener('click',function(e){
          e.preventDefault(); e.stopImmediatePropagation();
          window.location.href = 'session-medium.html';
        },true);
      }
    });
  }

  /* ── SESSION : bouton Done ── */
  if('comeback'.includes('session')){
    document.querySelectorAll('button, a').forEach(function(btn){
      var txt = (btn.innerText||'').trim().toLowerCase();
      if(txt === 'done' || txt.includes('done') || txt.includes('complete') || txt.includes('finish')){
        btn.addEventListener('click',function(e){
          e.preventDefault(); e.stopImmediatePropagation();
          window.location.href = 'celebration.html';
        },true);
      }
    });
  }

  /* ── CELEBRATION : retour home ── */
  if('comeback'.includes('celebration')){
    document.querySelectorAll('button, a').forEach(function(btn){
      var txt = (btn.innerText||'').trim().toLowerCase();
      if(txt.includes('home') || txt.includes('back') || txt.includes('return')){
        btn.addEventListener('click',function(e){
          e.preventDefault(); e.stopImmediatePropagation();
          window.location.href = 'home-medium.html';
        },true);
      }
    });
  }

  /* ── ACTIVITIES : liens bibliothèques ── */
  if('comeback'.includes('activities')){
    var LIB = {
      'stretching':  'library-stretching.html',
      'hiit':        'library-hiit.html',
      'cardio':      'library-hiit.html',
      'yoga':        'library-yoga.html',
      'breathwork':  'library-yoga.html',
      'outdoor run': 'library-outdoor-runs.html',
      'outdoor runs':'library-outdoor-runs.html',
      'strength':    'library-strength.html',
      'meditation':  'library-meditation.html',
      'mindful':     'library-meditation.html'
    };
    document.querySelectorAll('button, a, [role="button"]').forEach(function(el){
      var txt = (el.innerText||'').trim().toLowerCase();
      Object.keys(LIB).forEach(function(k){
        if(txt.includes(k)){
          el.addEventListener('click',function(e){
            e.preventDefault(); e.stopImmediatePropagation();
            window.location.href = LIB[k];
          },true);
        }
      });
    });
  }

  /* ── PROFILE : liens overlays ── */
  if('comeback'.includes('profile')){
    document.querySelectorAll('button, a, li, [role="listitem"]').forEach(function(el){
      var txt = (el.innerText||'').trim().toLowerCase();
      if(txt.includes('notification')){
        el.addEventListener('click',function(e){e.preventDefault();window.location.href='notifications.html';});
      } else if(txt.includes('energy level') || txt.includes('default energy')){
        el.addEventListener('click',function(e){e.preventDefault();window.location.href='energy.html';});
      } else if(txt.includes('about')){
        el.addEventListener('click',function(e){e.preventDefault();window.location.href='about.html';});
      } else if(txt.includes('training type') || txt.includes('preferred training')){
        el.addEventListener('click',function(e){e.preventDefault();window.location.href='notifications.html';});
      }
    });
  }

  /* ── OVERLAYS (notifications, energy, about) : Save + Back ── */
  if('comeback'.includes('notification') || 'comeback'.includes('energy') || 'comeback'.includes('about')){
    document.querySelectorAll('button, a').forEach(function(btn){
      var txt = (btn.innerText||'').trim().toLowerCase();
      if(txt.includes('save') || txt.includes('confirm') || txt.includes('back')){
        btn.addEventListener('click',function(e){
          e.preventDefault(); e.stopImmediatePropagation();
          window.location.href = 'profile.html';
        },true);
      }
    });
  }

})();
</script>
</body>
</html>
