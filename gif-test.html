<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>GIF Test</title></head>
<body style="font-family:sans-serif;padding:20px;">
<h2>Test ExerciseDB GIFs</h2>
<p id="status">Testing...</p>
<div id="results" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;"></div>
<script>
// Test 1: exercisedb.dev (open source, no key)
var EXERCISE_IDS = ['0082','0089','0041','0023','0030','0218','0630','0157','0029','1316','1411','0651'];
var BASE = 'https://exercisedb.dev/api/exercises/';

var loaded = 0, failed = 0;

function testId(id) {
  fetch(BASE + id)
    .then(r => r.json())
    .then(data => {
      loaded++;
      document.getElementById('status').textContent = 'Loaded: ' + loaded + ' | Failed: ' + failed;
      if(data.gifUrl) {
        var d = document.createElement('div');
        d.style.cssText = 'background:#f5f5f5;border-radius:8px;padding:8px;text-align:center;';
        d.innerHTML = '<img src="'+data.gifUrl+'" style="width:100%;border-radius:4px;" onerror="this.src=\'https://via.placeholder.com/200x200?text=Error\'"><p style="font-size:12px;margin:4px 0">'+data.name+'</p>';
        document.getElementById('results').appendChild(d);
      }
    })
    .catch(e => {
      failed++;
      document.getElementById('status').textContent = 'Loaded: ' + loaded + ' | Failed: ' + failed + ' | Error: ' + e.message;
    });
}

EXERCISE_IDS.forEach(testId);
</script>
</body></html>
