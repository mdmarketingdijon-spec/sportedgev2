<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gentle Flow - Standing Side Stretch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #1a1a1a;
      background-color: #FBFAF9;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .timer-display {
      font-family: "Outfit", sans-serif;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.05em;
    }

    .progress-label {
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .glass-effect {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .soft-shadow {
      box-shadow: 0 10px 30px -10px rgba(233, 150, 122, 0.3);
    }

    input:focus, button:focus {
      outline: none;
    }

    * {
      transition: all 0.2s ease;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Custom background blobs */
    .blob-orange {
      background: rgba(236, 150, 121, 0.05);
      filter: blur(64px);
    }
    .blob-green {
      background: rgba(103, 228, 187, 0.05);
      filter: blur(64px);
    }
  </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
  <!-- Background Decorative Elements -->
  <div class="absolute -top-20 -right-20 w-64 h-64 blob-orange rounded-full pointer-events-none"></div>
  <div class="absolute top-1/2 -left-20 w-48 h-48 blob-green rounded-full pointer-events-none"></div>

  <!-- Main Layout Container -->
  <div class="max-w-6xl mx-auto min-h-screen flex flex-col lg:flex-row">
    
    <!-- Desktop Sidebar (Hidden on Mobile/Tablet) -->
    <aside class="hidden lg:flex flex-col w-72 p-8 border-r border-gray-100 bg-white/50 sticky top-0 h-screen">
      <div class="mb-12">
        <h2 class="text-2xl text-[#EC9679]">YogaFlow</h2>
      </div>
      <nav class="space-y-6 flex-1">
        <a href="#" class="flex items-center gap-3 text-[#EC9679] font-semibold">
          <iconify-icon icon="ph:house-fill" width="24"></iconify-icon>
          <span>Dashboard</span>
        </a>
        <a href="#" class="flex items-center gap-3 text-[#6A5E53] hover:text-[#EC9679]">
          <iconify-icon icon="ph:barbell" width="24"></iconify-icon>
          <span>Workouts</span>
        </a>
        <a href="#" class="flex items-center gap-3 text-[#6A5E53] hover:text-[#EC9679]">
          <iconify-icon icon="ph:calendar-blank" width="24"></iconify-icon>
          <span>Schedule</span>
        </a>
        <a href="#" class="flex items-center gap-3 text-[#6A5E53] hover:text-[#EC9679]">
          <iconify-icon icon="ph:chart-line-up" width="24"></iconify-icon>
          <span>Progress</span>
        </a>
      </nav>
      <div class="mt-auto pt-8 border-t border-gray-100">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-[#FBEAE4] flex items-center justify-center">
            <iconify-icon icon="ph:user" class="text-[#EC9679]"></iconify-icon>
          </div>
          <div>
            <p class="text-sm font-semibold">Alex Rivera</p>
            <p class="text-xs text-[#6A5E53]">Premium Member</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative">
      
      <!-- Mobile Status Bar (Visual only) -->
      <header class="w-full h-10 flex justify-between items-center px-6 lg:hidden">
        <img src="./assets-session-medium-outdoor/IMG_1.svg" alt="Time" class="h-10">
        <img src="./assets-session-medium-outdoor/IMG_2.svg" alt="Status Icons" class="h-10">
      </header>

      <!-- Exercise Header -->
      <section class="pt-8 pb-4 text-center px-4">
        <div class="inline-flex items-center justify-center px-3 py-1 bg-[#F2FDF9] rounded-full mb-4">
          <span class="text-[12px] font-bold text-[#67E4BB] tracking-wider uppercase">Gentle Flow</span>
        </div>
        <h1 class="text-2xl md:text-4xl text-[#1D1A16] mb-2">Standing Side Stretch</h1>
        <p class="text-[#6A5E53] text-sm md:text-base">Focus on your breathing</p>
      </section>

      <!-- Exercise Visualization & Timer Section -->
      <div class="flex-1 flex flex-col md:flex-row items-center justify-center gap-8 lg:gap-16 px-6 py-8">
        
        <!-- Illustration Container -->
        <div class="relative w-64 h-64 md:w-80 md:h-80 lg:w-96 lg:h-96 flex items-center justify-center">
          <!-- Outer Ring -->
          <div class="absolute inset-0 rounded-full border-4 border-[#EC9679]/10 opacity-70"></div>
          <!-- Background Circle -->
          <div class="absolute inset-4 bg-[#FBEAE4] rounded-full shadow-sm"></div>
          <!-- Image -->
          <div class="relative z-10 w-4/5 h-4/5 overflow-hidden">
            <img src="./assets-session-medium-outdoor/IMG_3.webp" alt="Standing Side Stretch Illustration" class="w-full h-full object-contain">
          </div>
        </div>

        <!-- Timer & Progress Controls -->
        <div class="w-full max-w-md flex flex-col items-center md:items-start">
          <div class="text-center md:text-left mb-8">
            <span class="text-[12px] font-medium text-[#6A5E53] tracking-[1.2px] uppercase block mb-1">Remaining</span>
            <span class="timer-display text-7xl md:text-8xl font-bold text-[#EC9679]">08:42</span>
          </div>

          <!-- Progress Bar -->
          <div class="w-full mb-10">
            <div class="flex justify-between items-center mb-3">
              <span class="text-[12px] font-medium text-[#6A5E53] tracking-[0.6px] uppercase">Session Progress</span>
              <span class="text-[12px] font-bold text-[#67E4BB]">65%</span>
            </div>
            <div class="h-2 w-full bg-[#fdf3ef] rounded-full overflow-hidden">
              <div class="h-full bg-[#EC9679] rounded-full" style="width: 65%"></div>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="w-full space-y-4">
            <button class="w-full h-14 bg-[#EC9679] hover:bg-[#e08566] text-[#1D1A16] font-semibold text-lg rounded-full flex items-center justify-center gap-2 soft-shadow transition-transform active:scale-95">
              <img src="./assets-session-medium-outdoor/IMG_4.svg" alt="Check" class="w-5 h-5">
              <span>Done</span>
            </button>
            
            <button class="w-full h-10 flex items-center justify-center gap-2 text-[#6A5E53] hover:text-[#1D1A16] font-medium text-sm transition-colors">
              <img src="./assets-session-medium-outdoor/IMG_5.svg" alt="Skip" class="w-4 h-4">
              <span>Skip this exercise</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Desktop Footer / Metadata (Visible on larger screens) -->
      <footer class="hidden md:flex justify-between items-center px-12 py-8 border-t border-gray-100 bg-white/30 backdrop-blur-sm">
        <div class="flex gap-8">
          <div class="text-center">
            <p class="text-xs text-[#6A5E53] uppercase tracking-widest mb-1">Calories</p>
            <p class="font-bold text-[#1D1A16]">124 kcal</p>
          </div>
          <div class="text-center">
            <p class="text-xs text-[#6A5E53] uppercase tracking-widest mb-1">Heart Rate</p>
            <p class="font-bold text-[#1D1A16]">92 bpm</p>
          </div>
          <div class="text-center">
            <p class="text-xs text-[#6A5E53] uppercase tracking-widest mb-1">Intensity</p>
            <p class="font-bold text-[#1D1A16]">Low</p>
          </div>
        </div>
        <div class="flex gap-4">
          <button class="p-3 rounded-full bg-white border border-gray-100 hover:bg-gray-50">
            <iconify-icon icon="ph:music-note" class="text-[#6A5E53]"></iconify-icon>
          </button>
          <button class="p-3 rounded-full bg-white border border-gray-100 hover:bg-gray-50">
            <iconify-icon icon="ph:gear" class="text-[#6A5E53]"></iconify-icon>
          </button>
        </div>
      </footer>

      <!-- Mobile Bottom Navigation (Hidden on Desktop) -->
      <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 flex justify-around items-center py-3 px-4 z-50">
        <button class="flex flex-col items-center gap-1 text-[#EC9679]">
          <iconify-icon icon="ph:house-fill" width="24"></iconify-icon>
          <span class="text-[10px] font-medium">Home</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-[#6A5E53]">
          <iconify-icon icon="ph:barbell" width="24"></iconify-icon>
          <span class="text-[10px] font-medium">Workouts</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-[#6A5E53]">
          <iconify-icon icon="ph:chart-line-up" width="24"></iconify-icon>
          <span class="text-[10px] font-medium">Stats</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-[#6A5E53]">
          <iconify-icon icon="ph:user" width="24"></iconify-icon>
          <span class="text-[10px] font-medium">Profile</span>
        </button>
      </nav>

    </main>
  </div>



<script>
/* SportEdge Navigation v2 — session-medium-outdoor.html */
(function() {
  var PAGE = 'session-medium-outdoor.html';
  var IS_OUTDOOR = true;

  /* ── 1. BOTTOM NAV ── */
  var NAV_MAP = {
    'home':       'od-home-medium.html',
    'move':       'od-home-medium.html',
    'progress':   'od-progress.html',
    'activities': 'od-activities.html',
    'profile':    'od-profile.html',
    'bolt':       'od-bolt.html'
  };

  document.querySelectorAll('nav a, nav button').forEach(function(el) {
    var txt = el.innerText.trim().toLowerCase();
    var alt = (el.querySelector('img') || {}).alt || '';
    alt = alt.toLowerCase();
    Object.keys(NAV_MAP).forEach(function(k) {
      if (txt.indexOf(k) !== -1 || alt.indexOf(k) !== -1) {
        el.addEventListener('click', function(e) {
          e.preventDefault(); e.stopPropagation();
          window.location.href = NAV_MAP[k];
        });
      }
    });
  });

  /* ── 2. DELEGATION GLOBALE sur tout le document ── */
  document.addEventListener('click', function(e) {
    var el = e.target;
    // Remonter jusqu'à 5 niveaux pour trouver le conteneur cliquable
    for (var i = 0; i < 5; i++) {
      if (!el || el === document.body) break;
      var txt = (el.innerText || '').trim().toLowerCase();

      /* CTA principaux */
      if (/(start now|let.s go|start session|begin|commencer)/.test(txt)) {
        e.preventDefault();
        if (PAGE === 'onboarding.html') {
          var energy = window._sportedgeEnergy || 'medium';
          var loc    = window._sportedgeLocation || 'indoor';
          if (loc === 'outdoor') {
            window.location.href = 'home-' + energy + '-outdoor.html';
          } else {
            window.location.href = 'home-' + energy + '.html';
          }
        } else {
          window.location.href = 'od-home-medium.html';
        }
        return;
      }

      /* Post-session / Done */
      if (/(done|finish|complete|great job|i did it|well done)/.test(txt) && txt.length < 40) {
        e.preventDefault(); window.location.href = 'celebration.html'; return;
      }

      /* Back to home / Return */
      if (/(back to home|go home|return home)/.test(txt)) {
        e.preventDefault(); window.location.href = 'od-home-medium.html'; return;
      }

      /* Save / Confirm overlays */
      if (/^save/.test(txt) || txt === 'save preferences' || txt === 'confirm') {
        e.preventDefault(); window.location.href = 'od-profile.html'; return;
      }

      /* Activities → Libraries */
      if (PAGE.indexOf('activities') !== -1 || PAGE.indexOf('od-activities') !== -1) {
        var libMap = {
          'stretching': 'od-library-stretching.html',
          'hiit':       'od-library-hiit.html',
          'cardio':     'od-library-hiit.html',
          'yoga':       'od-library-yoga.html',
          'breathwork': 'od-library-yoga.html',
          'outdoor run':'od-library-outdoor-runs.html',
          'strength':   'od-library-strength.html',
          'meditation': 'od-library-meditation.html',
          'mindful':    'od-library-meditation.html'
        };
        Object.keys(libMap).forEach(function(k) {
          if (txt.indexOf(k) !== -1) {
            e.preventDefault(); window.location.href = libMap[k]; return;
          }
        });
      }

      /* Profile → overlays */
      if (PAGE.indexOf('profile') !== -1) {
        if (txt.indexOf('notification') !== -1) {
          e.preventDefault(); window.location.href = 'od-notifications.html'; return;
        }
        if (txt.indexOf('energy') !== -1) {
          e.preventDefault(); window.location.href = 'od-energy.html'; return;
        }
        if (txt.indexOf('about') !== -1) {
          e.preventDefault(); window.location.href = 'od-about.html'; return;
        }
        if (txt.indexOf('training type') !== -1 || txt.indexOf('preferred') !== -1) {
          e.preventDefault(); window.location.href = 'od-notifications.html'; return;
        }
      }

      /* Library / Overlay → retour */
      if (/(library|session|celebration|notification|energy|about|notification)/.test(PAGE)) {
        var isBackEl = (txt === '' || txt === '←' || txt === '‹' || txt === 'back') &&
                       (el.tagName === 'BUTTON' || el.tagName === 'A');
        var hasBackImg = el.querySelector && el.querySelector('img[alt*="back"], img[alt*="Back"], img[alt*="arrow"], img[alt*="Arrow"]');
        if (isBackEl || hasBackImg) {
          e.preventDefault(); window.history.back(); return;
        }
      }

      el = el.parentElement;
    }
  });

  /* ── 3. ONBOARDING : sélection énergie + lieu ── */
  if (PAGE === 'onboarding.html') {
    window._sportedgeEnergy   = 'medium';
    window._sportedgeLocation = 'indoor';

    document.querySelectorAll('button, [class*="rounded"]').forEach(function(btn) {
      var txt = (btn.innerText || '').trim().toLowerCase();
      if (txt.indexOf('low') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'low';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('high') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'high';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('medium') !== -1 && txt.length < 30) {
        btn.addEventListener('click', function() {
          window._sportedgeEnergy = 'medium';
          highlightSel(btn, 'energy');
        });
      } else if (txt.indexOf('trainer') !== -1 || txt.indexOf('outdoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'outdoor';
          highlightSel(btn, 'location');
        });
      } else if (txt.indexOf('mat') !== -1 || txt.indexOf('indoor') !== -1) {
        btn.addEventListener('click', function() {
          window._sportedgeLocation = 'indoor';
          highlightSel(btn, 'location');
        });
      }
    });

    /* CTA footer onboarding */
    var footerBtn = document.querySelector('footer button');
    if (footerBtn) {
      footerBtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        var e2 = window._sportedgeEnergy;
        var l  = window._sportedgeLocation;
        window.location.href = (l === 'outdoor')
          ? 'home-' + e2 + '-outdoor.html'
          : 'home-' + e2 + '.html';
      });
    }
  }

  function highlightSel(el, group) {
    var sel = '[data-group="' + group + '"]';
    document.querySelectorAll(sel).forEach(function(b) {
      b.style.borderColor = 'transparent';
      b.style.backgroundColor = '#F6F5F3';
    });
    el.dataset.group = group;
    el.style.borderColor = '#EC9679';
    el.style.backgroundColor = '#FDF4F2';
  }

})();
</script>

</body>
</html>
